  {q:{hi:'छांदोग्य उपनिषद में नमक-पानी का उदाहरण किसने दिया?',en:'Who gave the salt-water example in Chandogya?'},opts:{hi:['याज्ञवल्क्य','उद्दालक आरुणि','गार्गी','विश्वामित्र'],en:['Yajnavalkya','Uddalaka Aruni','Gargi','Vishwamitra']},ans:1,exp:{hi:'उद्दालक आरुणि ने बेटे श्वेतकेतु को नमक-पानी से "तत् त्वम् असि" समझाया।',en:'Uddalaka Aruni explained "Tat tvam asi" to his son Shvetaketu using salt dissolved in water.'},cat:'upanishad'},
  {q:{hi:'गायत्री मंत्र की रचना किस ऋषि ने की?',en:'Which sage composed the Gayatri Mantra?'},opts:{hi:['वशिष्ठ','विश्वामित्र','याज्ञवल्क्य','उद्दालक'],en:['Vashistha','Vishwamitra','Yajnavalkya','Uddalaka']},ans:1,exp:{hi:'विश्वामित्र ने गायत्री मंत्र की रचना की। वे पहले राजा थे, फिर ऋषि बने।',en:'Vishwamitra composed the Gayatri Mantra. He was originally a king who became a sage.'},cat:'rishi'},
  {q:{hi:'माण्डूक्य उपनिषद के बारे में शंकराचार्य ने क्या कहा?',en:'What did Shankaracharya say about the Mandukya Upanishad?'},opts:{hi:['यह कठिन है','अकेला काफी है मोक्ष के लिए','यह सबसे बड़ा है','यह बाद में लिखा गया'],en:['It is difficult','This alone is sufficient for liberation','It is the largest','It was written later']},ans:1,exp:{hi:'शंकराचार्य ने कहा -- "माण्डूक्य उपनिषद अकेला ही मोक्ष के लिए काफी है।"',en:'Shankaracharya said -- "The Mandukya Upanishad alone is sufficient for liberation."'},cat:'philosophy'},
  {q:{hi:'"अहम् ब्रह्मास्मि" किस उपनिषद का महावाक्य है?',en:'"Aham Brahmasmi" -- from which Upanishad?'},opts:{hi:['छांदोग्य','ऐतरेय','बृहदारण्यक','माण्डूक्य'],en:['Chandogya','Aitareya','Brihadaranyaka','Mandukya']},ans:2,exp:{hi:'"अहम् ब्रह्मास्मि" बृहदारण्यक उपनिषद 1.4.10 का महावाक्य है।',en:'"Aham Brahmasmi" is the Mahavakya of Brihadaranyaka Upanishad 1.4.10.'},cat:'upanishad'},
  {q:{hi:'वेदांत के कुल कितने महावाक्य हैं?',en:'How many Mahavakyas are there in Vedanta?'},opts:{hi:['2','3','4','5'],en:['2','3','4','5']},ans:2,exp:{hi:'वेदांत में 4 महावाक्य हैं: प्रज्ञानम् ब्रह्म, अहम् ब्रह्मास्मि, तत् त्वम् असि, अयम् आत्मा ब्रह्म।',en:'There are 4 Mahavakyas: Prajnanam Brahma, Aham Brahmasmi, Tat Tvam Asi, Ayam Atma Brahma.'},cat:'philosophy'},
  {q:{hi:'"प्रज्ञानम् ब्रह्म" किस उपनिषद का महावाक्य है?',en:'"Prajnanam Brahma" -- from which Upanishad?'},opts:{hi:['ऐतरेय','छांदोग्य','माण्डूक्य','बृहदारण्यक'],en:['Aitareya','Chandogya','Mandukya','Brihadaranyaka']},ans:0,exp:{hi:'"प्रज्ञानम् ब्रह्म" ऐतरेय उपनिषद 3.3 का महावाक्य है -- ऋग्वेद से।',en:'"Prajnanam Brahma" is from Aitareya Upanishad 3.3 -- belonging to the Rigveda.'},cat:'upanishad'},
  {q:{hi:'अथर्ववेद में कुल कितने सूक्त हैं?',en:'How many hymns in the Atharvaveda?'},opts:{hi:['400','600','730','1000'],en:['400','600','730','1000']},ans:2,exp:{hi:'अथर्ववेद में 730 सूक्त और लगभग 6,000 श्लोक हैं।',en:'The Atharvaveda has 730 hymns and approximately 6,000 verses.'},cat:'veda'},
  {q:{hi:'सामवेद में कुल कितनी ऋचाएं हैं?',en:'How many verses in the Samaveda?'},opts:{hi:['1028','1500','1875','2000'],en:['1028','1500','1875','2000']},ans:2,exp:{hi:'सामवेद में 1,875 ऋचाएं हैं जिनमें सिर्फ 75 मूल रूप से सामवेद की अपनी हैं।',en:'The Samaveda has 1,875 verses, of which only 75 are original to the Samaveda.'},cat:'veda'},
  {q:{hi:'तुरीय अवस्था क्या है?',en:'What is the Turiya state?'},opts:{hi:['गहरी नींद','सपने की अवस्था','शुद्ध चेतना -- चौथी अवस्था','जागने की अवस्था'],en:['Deep sleep','Dream state','Pure consciousness -- the fourth state','Waking state']},ans:2,exp:{hi:'तुरीय = शुद्ध चेतना। यह तीनों अवस्थाओं (जागना, सपना, नींद) का साक्षी है।',en:'Turiya = pure consciousness. It is the witness of all three states (waking, dream, sleep).'},cat:'philosophy'},
  {q:{hi:'याज्ञवल्क्य की पत्नी का क्या नाम था जो भी दार्शनिक थीं?',en:'What was the name of Yajnavalkya\'s wife who was also a philosopher?'},opts:{hi:['गार्गी','अरुंधति','मैत्रेयी','लोपामुद्रा'],en:['Gargi','Arundhati','Maitreyi','Lopamudra']},ans:2,exp:{hi:'मैत्रेयी -- उन्होंने याज्ञवल्क्य से सोने की जगह ब्रह्म-ज्ञान मांगा।',en:'Maitreyi -- she asked Yajnavalkya for Brahma-jnana instead of gold.'},cat:'rishi'},
  {q:{hi:'वशिष्ठ किस राजा के कुल गुरु थे?',en:'Vashistha was the family priest of which king?'},opts:{hi:['राजा जनक','राजा दशरथ','राजा अशोक','राजा विक्रमादित्य'],en:['King Janaka','King Dasharatha','King Ashoka','King Vikramaditya']},ans:1,exp:{hi:'वशिष्ठ राजा दशरथ (राम के पिता) के कुल गुरु थे।',en:'Vashistha was the family priest of King Dasharatha, father of Rama.'},cat:'rishi'},
  {q:{hi:'मुंडकोपनिषद में कितनी विद्याएं बताई गई हैं?',en:'How many types of knowledge in Mundaka Upanishad?'},opts:{hi:['1','2','3','4'],en:['1','2','3','4']},ans:1,exp:{hi:'मुंडकोपनिषद में दो विद्याएं हैं: अपरा विद्या (साधारण ज्ञान) और परा विद्या (ब्रह्म-ज्ञान)।',en:'Mundaka has two kinds: Apara Vidya (ordinary knowledge) and Para Vidya (knowledge of Brahman).'},cat:'upanishad'},
  {q:{hi:'पृथ्वी सूक्त किस वेद में है?',en:'In which Veda is the Prithvi Sukta (Earth Hymn)?'},opts:{hi:['ऋग्वेद','सामवेद','यजुर्वेद','अथर्ववेद'],en:['Rigveda','Samaveda','Yajurveda','Atharvaveda']},ans:3,exp:{hi:'पृथ्वी सूक्त अथर्ववेद 12.1 में है -- 63 श्लोकों का सबसे लंबा भजन।',en:'The Prithvi Sukta is in Atharvaveda 12.1 -- the longest hymn with 63 verses.'},cat:'veda'},
  {q:{hi:'श्री रुद्रम् किस वेद में है?',en:'In which Veda is the Sri Rudram?'},opts:{hi:['ऋग्वेद','सामवेद','यजुर्वेद (कृष्ण)','अथर्ववेद'],en:['Rigveda','Samaveda','Yajurveda (Krishna)','Atharvaveda']},ans:2,exp:{hi:'श्री रुद्रम् कृष्ण यजुर्वेद (तैत्तिरीय संहिता) में है -- रुद्र के 108 नाम।',en:'Sri Rudram is in Krishna Yajurveda (Taittiriya Samhita) -- contains 108 names of Rudra.'},cat:'veda'},
  {q:{hi:'वरुण देव किसके देव हैं?',en:'Varuna is the god of?'},opts:{hi:['अग्नि','सत्य और जल','युद्ध','सूर्य'],en:['Fire','Truth and water','War','Sun']},ans:1,exp:{hi:'वरुण देव सत्य, न्याय, पानी और नैतिक कानून के देव हैं।',en:'Varuna is the god of truth, justice, water and moral law.'},cat:'deity'},
  {q:{hi:'सोम क्या था?',en:'What was Soma?'},opts:{hi:['एक राग','एक पवित्र पेय और देव','एक यज्ञ','एक उपनिषद'],en:['A melody','A sacred drink and deity','A ritual','An Upanishad']},ans:1,exp:{hi:'सोम एक पवित्र पेय था जो यज्ञ में चढ़ाया जाता था -- अमरता और आनंद का प्रतीक।',en:'Soma was a sacred ritual drink offered in yajna -- symbol of immortality and divine joy.'},cat:'deity'},
  {q:{hi:'ऋग्वेद की पहली ऋचा किस देव को समर्पित है?',en:'The first verse of Rigveda is dedicated to which deity?'},opts:{hi:['इंद्र','सूर्य','अग्नि','वरुण'],en:['Indra','Surya','Agni','Varuna']},ans:2,exp:{hi:'ऋग्वेद 1.1.1 अग्नि देव को समर्पित है -- "अग्निमीळे पुरोहितम्।"',en:'Rigveda 1.1.1 is dedicated to Agni -- "Agnimile purohitam."'},cat:'deity'},
  {q:{hi:'ईशावास्योपनिषद में कितने श्लोक हैं?',en:'How many verses in the Isha Upanishad?'},opts:{hi:['12','15','18','21'],en:['12','15','18','21']},ans:2,exp:{hi:'ईशावास्योपनिषद में 18 श्लोक हैं -- शुक्ल यजुर्वेद का भाग।',en:'The Isha Upanishad has 18 verses -- it belongs to the Shukla Yajurveda.'},cat:'upanishad'},
  {q:{hi:'कठ उपनिषद में मुख्य पात्र कौन है?',en:'The main character in Katha Upanishad?'},opts:{hi:['श्वेतकेतु','नचिकेता','प्रतर्दन','शौनक'],en:['Shvetaketu','Nachiketa','Pratardana','Shaunaka']},ans:1,exp:{hi:'नचिकेता -- जिसने यम (मृत्यु देव) से आत्मा का ज्ञान प्राप्त किया।',en:'Nachiketa -- who gained the knowledge of the Self from Yama, the god of death.'},cat:'upanishad'},
  {q:{hi:'मुंडकोपनिषद में "दो पक्षी" का रूपक क्या दर्शाता है?',en:'What do the "two birds" in Mundaka represent?'},opts:{hi:['दो वेद','व्यक्तिगत आत्मा और परमात्मा','दो ऋषि','दिन और रात'],en:['Two Vedas','Individual soul and Brahman','Two sages','Day and night']},ans:1,exp:{hi:'एक पक्षी (आत्मा) फल खाता है, दूसरा (परमात्मा) सिर्फ देखता है -- साक्षी।',en:'One bird (soul) eats fruits; the other (Brahman) only watches -- the eternal witness.'},cat:'philosophy'},
  {q:{hi:'अद्वैत वेदांत के प्रवर्तक कौन हैं?',en:'Who is the founder of Advaita Vedanta?'},opts:{hi:['रामानुजाचार्य','मध्वाचार्य','आदि शंकराचार्य','वल्लभाचार्य'],en:['Ramanujacharya','Madhvacharya','Adi Shankaracharya','Vallabhacharya']},ans:2,exp:{hi:'आदि शंकराचार्य (8वीं सदी ईस्वी) ने अद्वैत वेदांत दर्शन को स्थापित किया।',en:'Adi Shankaracharya (8th century CE) established the Advaita Vedanta philosophy.'},cat:'philosophy'},
  {q:{hi:'वेद कितने हैं?',en:'How many Vedas are there?'},opts:{hi:['2','3','4','5'],en:['2','3','4','5']},ans:2,exp:{hi:'चार वेद हैं: ऋग्वेद, सामवेद, यजुर्वेद और अथर्ववेद।',en:'There are four Vedas: Rigveda, Samaveda, Yajurveda and Atharvaveda.'},cat:'veda'},
  {q:{hi:'कुल कितने उपनिषद हैं?',en:'How many Upanishads are there in total?'},opts:{hi:['18','52','108','200'],en:['18','52','108','200']},ans:2,exp:{hi:'परंपरागत रूप से 108 उपनिषद माने जाते हैं, जिनमें 10 मुख्य (दशोपनिषद) हैं।',en:'Traditionally 108 Upanishads are recognized, of which 10 are considered principal (Dasopanishad).'},cat:'upanishad'},
  {q:{hi:'सातों स्वर (सा रे ग म...) किस वेद से आए?',en:'The seven musical notes (Sa Re Ga...) originate from which Veda?'},opts:{hi:['ऋग्वेद','सामवेद','यजुर्वेद','अथर्ववेद'],en:['Rigveda','Samaveda','Yajurveda','Atharvaveda']},ans:1,exp:{hi:'भारतीय संगीत के सात स्वर सामवेद की गायन परंपरा से आए।',en:'The seven notes of Indian music derive from the Samaveda singing tradition.'},cat:'veda'},
  {q:{hi:'धर्म की अवधारणा किस वैदिक सिद्धांत से विकसित हुई?',en:'The concept of Dharma evolved from which Vedic principle?'},opts:{hi:['सोम','ऋत','यज्ञ','तपस'],en:['Soma','Rita','Yajna','Tapas']},ans:1,exp:{hi:'ऋत (ब्रह्मांडीय सत्य और व्यवस्था) से ही बाद में "धर्म" की अवधारणा विकसित हुई।',en:'Rita (cosmic truth and order) later evolved into the concept of Dharma.'},cat:'philosophy'},
  {q:{hi:'शतपथ ब्राह्मण किस वेद से है?',en:'The Shatapatha Brahmana belongs to which Veda?'},opts:{hi:['ऋग्वेद','सामवेद','शुक्ल यजुर्वेद','अथर्ववेद'],en:['Rigveda','Samaveda','Shukla Yajurveda','Atharvaveda']},ans:2,exp:{hi:'शतपथ ब्राह्मण शुक्ल यजुर्वेद का सबसे महत्वपूर्ण ग्रंथ है -- 100 अध्याय।',en:'Shatapatha Brahmana is the most important text of Shukla Yajurveda -- 100 chapters.'},cat:'veda'},
  {q:{hi:'अग्निचयन यज्ञ में कितनी ईंटें लगती थीं?',en:'How many bricks were used in the Agnichayana ritual?'},opts:{hi:['1,008','5,000','10,800','20,000'],en:['1,008','5,000','10,800','20,000']},ans:2,exp:{hi:'अग्निचयन यज्ञ में 10,800 ईंटों से बाज (eagle) के आकार की वेदी बनाई जाती थी।',en:'The Agnichayana ritual used 10,800 bricks to build a falcon-shaped fire altar.'},cat:'ritual'},
  {q:{hi:'सूर्य देव को समर्पित सबसे पवित्र मंत्र कौन सा है?',en:'What is the most sacred mantra dedicated to the Sun god?'},opts:{hi:['महामृत्युञ्जय मंत्र','गायत्री मंत्र','श्री रुद्रम्','पुरुष सूक्त'],en:['Mahamrityunjaya Mantra','Gayatri Mantra','Sri Rudram','Purusha Sukta']},ans:1,exp:{hi:'गायत्री मंत्र सूर्य देव (सविता) को समर्पित है -- ऋग्वेद 3.62.10।',en:'The Gayatri Mantra is dedicated to the Sun god (Savita) -- Rigveda 3.62.10.'},cat:'mantra'},
  {q:{hi:'उपनिषद शब्द का अर्थ क्या है?',en:'What does the word "Upanishad" mean?'},opts:{hi:['ऊपर जाना','पास बैठना','जल देना','मंत्र बोलना'],en:['To go above','To sit close (near the teacher)','To give water','To chant mantras']},ans:1,exp:{hi:'"उपनिषद" = उप (पास) + नि (नीचे) + षद (बैठना) -- गुरु के पास बैठकर ज्ञान पाना।',en:'"Upanishad" = upa (near) + ni (down) + shad (sit) -- to sit close to the teacher to gain wisdom.'},cat:'philosophy'},
  {q:{hi:'केन उपनिषद का मुख्य प्रश्न क्या है?',en:'What is the main question of the Kena Upanishad?'},opts:{hi:['आत्मा कहाँ जाती है?','किसके द्वारा मन सोचता है?','ब्रह्म क्या खाता है?','मोक्ष कैसे मिलता है?'],en:['Where does the soul go?','By whose will does the mind think?','What does Brahman eat?','How to attain liberation?']},ans:1,exp:{hi:'केन उपनिषद का आरंभ -- "केनेषितं पतति प्रेषितं मनः?" -- किसके आदेश से मन चलता है?',en:'Kena opens with "Keneshitam patati preshitam manah?" -- By whose command does the mind move?'},cat:'upanishad'},
  {q:{hi:'ऋग्वेद का सबसे प्रसिद्ध सूक्त कौन सा है?',en:'What is the most famous Sukta of the Rigveda?'},opts:{hi:['सोम सूक्त','पुरुष सूक्त','अग्नि सूक्त','वरुण सूक्त'],en:['Soma Sukta','Purusha Sukta','Agni Sukta','Varuna Sukta']},ans:1,exp:{hi:'पुरुष सूक्त (ऋग्वेद 10.90) -- जिसमें ब्रह्मांड की उत्पत्ति का वर्णन है।',en:'The Purusha Sukta (Rigveda 10.90) describes the origin of the universe from the cosmic being.'},cat:'veda'},
  {q:{hi:'अथर्ववेद किसका उपवेद है?',en:'Atharvaveda is the origin of which traditional science?'},opts:{hi:['धनुर्वेद','गंधर्व वेद','आयुर्वेद','स्थापत्य वेद'],en:['Dhanurveda','Gandharva Veda','Ayurveda','Sthapatya Veda']},ans:2,exp:{hi:'अथर्ववेद से आयुर्वेद (चिकित्सा) की उत्पत्ति हुई। इसमें जड़ी-बूटियों के मंत्र हैं।',en:'Ayurveda (medicine) originates from the Atharvaveda, which contains herbal healing spells.'},cat:'veda'},
  {q:{hi:'सामवेद का मुख्य उद्देश्य क्या था?',en:'What was the main purpose of the Samaveda?'},opts:{hi:['युद्ध के मंत्र','सोम यज्ञ के दौरान गाना','बीमारी का इलाज','दर्शन समझाना'],en:['War mantras','Singing during the Soma sacrifice','Healing illness','Explaining philosophy']},ans:1,exp:{hi:'सामवेद के मंत्र सोम यज्ञ के दौरान उद्गातृ पुजारी गाते थे।',en:'The Samaveda verses were sung by the Udgatr priest during the Soma sacrifice.'},cat:'veda'},
  {q:{hi:'ऐतरेय उपनिषद किस वेद से है?',en:'The Aitareya Upanishad belongs to which Veda?'},opts:{hi:['ऋग्वेद','सामवेद','यजुर्वेद','अथर्ववेद'],en:['Rigveda','Samaveda','Yajurveda','Atharvaveda']},ans:0,exp:{hi:'ऐतरेय उपनिषद ऋग्वेद का है -- इसका महावाक्य "प्रज्ञानम् ब्रह्म" है।',en:'The Aitareya Upanishad belongs to the Rigveda -- its Mahavakya is "Prajnanam Brahma."'},cat:'upanishad'},
  {q:{hi:'वेद को "श्रुति" क्यों कहते हैं?',en:'Why are the Vedas called "Shruti"?'},opts:{hi:['क्योंकि वे बहुत पुराने हैं','क्योंकि वे सुनकर (मौखिक परंपरा से) याद किए गए','क्योंकि वे संस्कृत में हैं','क्योंकि वे मंत्रों का संग्रह हैं'],en:['Because they are very old','Because they were heard and memorized orally','Because they are in Sanskrit','Because they are a collection of mantras']},ans:1,exp:{hi:'"श्रुति" का अर्थ है "सुना हुआ।" वेद ऋषियों ने दिव्य ध्वनि से सुने और शिष्यों को सुनाए।',en:'"Shruti" means "that which is heard." Vedas were heard by sages from divine sound and passed down orally.'},cat:'philosophy'},
  {q:{hi:'भगवद्गीता किस ग्रंथ का हिस्सा है?',en:'The Bhagavad Gita is part of which scripture?'},opts:{hi:['रामायण','महाभारत','पुराण','वेद'],en:['Ramayana','Mahabharata','Purana','Veda']},ans:1,exp:{hi:'भगवद्गीता महाभारत के भीष्म पर्व का हिस्सा है -- उपनिषदों का सार।',en:'The Bhagavad Gita is part of the Bhishma Parva of the Mahabharata -- the essence of the Upanishads.'},cat:'philosophy'},
  {q:{hi:'उद्गीथ क्या है?',en:'What is Udgitha?'},opts:{hi:['एक यज्ञ','सोम यज्ञ का केंद्रीय गान जो ॐ से शुरू होता है','एक उपनिषद','एक पुजारी का नाम'],en:['A ritual','The central chant of Soma sacrifice beginning with Om','An Upanishad','A priest\'s name']},ans:1,exp:{hi:'उद्गीथ सोम यज्ञ का सबसे महत्वपूर्ण गान है जो ॐ से शुरू होता है।',en:'Udgitha is the most important chant of the Soma sacrifice, beginning with Om.'},cat:'ritual'},
  {q:{hi:'"अयम् आत्मा ब्रह्म" किस उपनिषद का महावाक्य है?',en:'"Ayam Atma Brahma" -- from which Upanishad?'},opts:{hi:['छांदोग्य','बृहदारण्यक','माण्डूक्य','मुंडक'],en:['Chandogya','Brihadaranyaka','Mandukya','Mundaka']},ans:2,exp:{hi:'"अयम् आत्मा ब्रह्म" माण्डूक्य उपनिषद का महावाक्य है।',en:'"Ayam Atma Brahma" is the Mahavakya of the Mandukya Upanishad.'},cat:'upanishad'},
  {q:{hi:'सूर्य देव के रथ में कितने घोड़े हैं?',en:'How many horses pull the chariot of Surya (Sun god)?'},opts:{hi:['4','5','7','8'],en:['4','5','7','8']},ans:2,exp:{hi:'सूर्य देव के रथ में 7 घोड़े हैं -- सात रंगों और सात दिनों के प्रतीक।',en:'Surya\'s chariot has 7 horses -- representing the 7 colors of light and 7 days of the week.'},cat:'deity'},
  {q:{hi:'कृष्ण यजुर्वेद को "कृष्ण" क्यों कहते हैं?',en:'Why is Krishna Yajurveda called "Krishna" (dark)?'},opts:{hi:['क्योंकि यह रात को पढ़ा जाता था','क्योंकि मंत्र और व्याख्या साथ-साथ मिली हुई हैं','क्योंकि यह काले रंग की स्याही से लिखा गया','क्योंकि यह कृष्ण ने लिखा'],en:['Because it was recited at night','Because mantras and commentary are mixed together','Because it was written in black ink','Because Krishna wrote it']},ans:1,exp:{hi:'कृष्ण यजुर्वेद में मंत्र और ब्राह्मण व्याख्या एक साथ मिली हुई हैं -- इसलिए "मिला-जुला" या "अंधेरा।"',en:'In Krishna Yajurveda, mantras and Brahmana commentary are mixed together -- hence "dark" or "mixed."'},cat:'veda'},
  {q:{hi:'शुक्ल यजुर्वेद को "शुक्ल" क्यों कहते हैं?',en:'Why is Shukla Yajurveda called "Shukla" (white/pure)?'},opts:{hi:['क्योंकि यह दिन में पढ़ा जाता था','क्योंकि मंत्र और व्याख्या अलग-अलग हैं','क्योंकि यह सफेद कागज पर लिखा गया','क्योंकि यह शुद्ध है'],en:['Because it was recited during day','Because mantras and commentary are separate','Because it was written on white paper','Because it is pure']},ans:1,exp:{hi:'शुक्ल यजुर्वेद में मंत्र और ब्राह्मण व्याख्या अलग-अलग ग्रंथों में हैं -- इसलिए "शुद्ध।"',en:'In Shukla Yajurveda, mantras and Brahmana commentary are in separate texts -- hence "pure" or "white."'},cat:'veda'},
  {q:{hi:'ऋग्वेद की रचना कब हुई?',en:'When was the Rigveda composed?'},opts:{hi:['लगभग 500 ईसा पूर्व','लगभग 1000 ईसा पूर्व','लगभग 1500 ईसा पूर्व','लगभग 3000 ईसा पूर्व'],en:['Around 500 BCE','Around 1000 BCE','Around 1500 BCE','Around 3000 BCE']},ans:2,exp:{hi:'ऋग्वेद की रचना लगभग 1500 ईसा पूर्व हुई -- यह सबसे पुराना वैदिक ग्रंथ है।',en:'The Rigveda was composed around 1500 BCE -- it is the oldest Vedic text.'},cat:'history'},
  {q:{hi:'विश्वामित्र पहले क्या थे, फिर ऋषि बने?',en:'What was Vishwamitra before becoming a sage?'},opts:{hi:['व्यापारी','ब्राह्मण','राजा (क्षत्रिय)','किसान'],en:['Merchant','Brahmin','King (Kshatriya)','Farmer']},ans:2,exp:{hi:'विश्वामित्र पहले एक राजा (क्षत्रिय) थे जो कठोर तपस्या से ऋषि बने -- यह बहुत दुर्लभ था।',en:'Vishwamitra was originally a king (Kshatriya) who became a sage through intense penance -- extremely rare.'},cat:'rishi'},
  {q:{hi:'सप्तर्षि कौन हैं?',en:'Who are the Saptarishi?'},opts:{hi:['सात देवता','सात महान ऋषि','सात ग्रह','सात नदियां'],en:['Seven deities','Seven great sages','Seven planets','Seven rivers']},ans:1,exp:{hi:'सप्तर्षि = सात महान ऋषि जिनमें वशिष्ठ, विश्वामित्र, अत्रि, भारद्वाज आदि शामिल हैं।',en:'Saptarishi = Seven great sages including Vashistha, Vishwamitra, Atri, Bharadvaja and others.'},cat:'rishi'},
  {q:{hi:'मोक्ष का अर्थ क्या है?',en:'What does Moksha mean?'},opts:{hi:['धन प्राप्ति','स्वर्ग में जाना','जन्म-मृत्यु के चक्र से मुक्ति','लंबा जीवन'],en:['Gaining wealth','Going to heaven','Liberation from the cycle of birth and death','A long life']},ans:2,exp:{hi:'मोक्ष = जन्म-मृत्यु (संसार) के चक्र से मुक्ति। ब्रह्म-ज्ञान से मोक्ष मिलता है।',en:'Moksha = liberation from the cycle of birth and death (samsara). Attained through knowledge of Brahman.'},cat:'philosophy'},
  {q:{hi:'ब्रह्म क्या है?',en:'What is Brahman?'},opts:{hi:['ब्रह्मा देव','एक पुजारी','हर जगह मौजूद परम शक्ति -- शुद्ध चेतना','एक मंत्र'],en:['The god Brahma','A priest','The ultimate reality pervading everything -- pure consciousness','A mantra']},ans:2,exp:{hi:'ब्रह्म = वह शक्ति जो हर जगह है। न जन्मा, न मरेगा। शुद्ध चेतना। यही मोक्ष का लक्ष्य है।',en:'Brahman = the ultimate reality pervading everything. Never born, never dies. Pure consciousness. The goal of Moksha.'},cat:'philosophy'},
  {q:{hi:'आत्मन क्या है?',en:'What is Atman?'},opts:{hi:['शरीर','मन','व्यक्तिगत आत्मा जो ब्रह्म के समान है','एक देव'],en:['The body','The mind','The individual soul which is identical to Brahman','A deity']},ans:2,exp:{hi:'आत्मन = हमारे अंदर की वह शुद्ध चेतना जो ब्रह्म के समान है। "आत्मन = ब्रह्म" वेदांत का सार है।',en:'Atman = the pure consciousness within us, identical to Brahman. "Atman = Brahman" is the essence of Vedanta.'},cat:'philosophy'},
  {q:{hi:'संसार का अर्थ क्या है?',en:'What does Samsara mean?'},opts:{hi:['संसद','जन्म-मृत्यु का चक्र','भारत देश','एक यज्ञ'],en:['Parliament','The cycle of birth and death','India','A ritual']},ans:1,exp:{hi:'संसार = जन्म-मृत्यु का अनवरत चक्र। इससे मुक्ति ही मोक्ष है।',en:'Samsara = the endless cycle of birth and death. Liberation from it is Moksha.'},cat:'philosophy'},
  {q:{hi:'माया का अर्थ क्या है?',en:'What does Maya mean in Vedanta?'},opts:{hi:['जादू','ब्रह्मांड की वह शक्ति जो हमें वास्तविकता से अलग करती है','एक देवी','प्यार'],en:['Magic','The cosmic power that veils true reality','A goddess','Love']},ans:1,exp:{hi:'माया = वह शक्ति जो हमें ब्रह्म की असली प्रकृति देखने से रोकती है -- भ्रम।',en:'Maya = the power that prevents us from seeing the true nature of Brahman -- cosmic illusion.'},cat:'philosophy'},
  {q:{hi:'कर्म का वैदिक अर्थ क्या है?',en:'What is the Vedic meaning of Karma?'},opts:{hi:['भाग्य','कर्म और उसका फल -- कारण-कार्य सिद्धांत','एक यज्ञ','एक देव'],en:['Fate','Action and its result -- the law of cause and effect','A sacrifice','A deity']},ans:1,exp:{hi:'कर्म = कर्म और उसका फल। जो बोओगे, वही काटोगे। यह भगवद्गीता और वेदों का मूल सिद्धांत है।',en:'Karma = action and its result. As you sow, so shall you reap. A foundational principle of the Vedas and Gita.'},cat:'philosophy'},
  {q:{hi:'धर्म का वेदों में क्या अर्थ है?',en:'What does Dharma mean in the Vedas?'},opts:{hi:['धर्म (religion)','ब्रह्मांडीय नियम, सत्य, नैतिक व्यवस्था','एक देव','एक ग्रंथ'],en:['Religion','Cosmic law, truth, moral order','A deity','A scripture']},ans:1,exp:{hi:'धर्म = ऋत से उत्पन्न -- ब्रह्मांडीय नियम, सत्य और नैतिक व्यवस्था। यह "कर्तव्य" भी है।',en:'Dharma = derived from Rita -- cosmic law, truth and moral order. It also means "duty" or "right action."'},cat:'philosophy'},
  {q:{hi:'यज्ञ क्या है?',en:'What is a Yajna?'},opts:{hi:['एक उपनिषद','वैदिक अग्नि यज्ञ और अनुष्ठान','एक ऋषि का नाम','एक मंत्र'],en:['An Upanishad','A Vedic fire sacrifice and ritual','A sage\'s name','A mantra']},ans:1,exp:{hi:'यज्ञ = वैदिक अग्नि यज्ञ जिसमें देवताओं को आहुति दी जाती है। अग्नि, इंद्र, वरुण आदि देव आह्वान।',en:'Yajna = a Vedic fire sacrifice where offerings are made to deities like Agni, Indra, Varuna.'},cat:'ritual'},
  {q:{hi:'तपस का क्या अर्थ है?',en:'What does Tapas mean?'},opts:{hi:['गर्मी','आत्म-अनुशासन और तपस्या','एक देव','एक भोजन'],en:['Heat','Self-discipline and austerity','A deity','A food']},ans:1,exp:{hi:'तपस = आत्म-अनुशासन, तपस्या। ऋषि तपस के द्वारा दिव्य शक्तियां प्राप्त करते थे।',en:'Tapas = self-discipline and austerity. Sages gained divine powers through Tapas.'},cat:'philosophy'},
  {q:{hi:'ऋग्वेद के किस मंडल में गायत्री मंत्र है?',en:'In which Mandala of the Rigveda is the Gayatri Mantra?'},opts:{hi:['पहले मंडल में','तीसरे मंडल में','सातवें मंडल में','दसवें मंडल में'],en:['First Mandala','Third Mandala','Seventh Mandala','Tenth Mandala']},ans:1,exp:{hi:'गायत्री मंत्र ऋग्वेद के तीसरे मंडल (3.62.10) में है।',en:'The Gayatri Mantra is in the Third Mandala of the Rigveda (3.62.10).'},cat:'veda'},
  {q:{hi:'वशिष्ठ ने ऋग्वेद का कौन सा मंडल लिखा?',en:'Which Mandala of the Rigveda did Vashistha compose?'},opts:{hi:['पहला','तीसरा','सातवां','दसवां'],en:['First','Third','Seventh','Tenth']},ans:2,exp:{hi:'वशिष्ठ ऋषि ने ऋग्वेद का सातवां मंडल लिखा। यह सबसे पुराने "पारिवारिक मंडलों" में से एक है।',en:'Sage Vashistha composed the Seventh Mandala of the Rigveda -- one of the oldest "family books."'},cat:'rishi'},
  {q:{hi:'शंकराचार्य किस सदी में हुए?',en:'In which century did Shankaracharya live?'},opts:{hi:['5वीं सदी ईस्वी','8वीं सदी ईस्वी','12वीं सदी ईस्वी','16वीं सदी ईस्वी'],en:['5th century CE','8th century CE','12th century CE','16th century CE']},ans:1,exp:{hi:'आदि शंकराचार्य लगभग 788-820 ईस्वी में हुए -- 8वीं सदी में।',en:'Adi Shankaracharya lived approximately 788-820 CE -- in the 8th century.'},cat:'history'},
  {q:{hi:'वेद किस भाषा में लिखे गए हैं?',en:'In which language are the Vedas written?'},opts:{hi:['पाली','प्राकृत','वैदिक संस्कृत','तमिल'],en:['Pali','Prakrit','Vedic Sanskrit','Tamil']},ans:2,exp:{hi:'वेद वैदिक संस्कृत में हैं -- जो आधुनिक संस्कृत से पुरानी और अलग है।',en:'The Vedas are in Vedic Sanskrit -- an older and different form from classical Sanskrit.'},cat:'history'},
  {q:{hi:'गंधर्व वेद किससे संबंधित है?',en:'Gandharva Veda is related to which art?'},opts:{hi:['नृत्य','संगीत','चित्रकला','वास्तुकला'],en:['Dance','Music','Painting','Architecture']},ans:1,exp:{hi:'गंधर्व वेद संगीत का उपवेद है -- जिसकी जड़ें सामवेद में हैं।',en:'Gandharva Veda is the subsidiary Veda of music -- its roots are in the Samaveda.'},cat:'veda'},
  {q:{hi:'धनुर्वेद किससे संबंधित है?',en:'Dhanurveda is related to?'},opts:{hi:['आयुर्वेद','युद्धकला और धनुर्विद्या','संगीत','वास्तुकला'],en:['Ayurveda','Martial arts and archery','Music','Architecture']},ans:1,exp:{hi:'धनुर्वेद युद्धकला का उपवेद है -- यजुर्वेद से संबंधित।',en:'Dhanurveda is the subsidiary Veda of martial arts and archery -- related to the Yajurveda.'},cat:'veda'},
  {q:{hi:'वेदों को मौखिक परंपरा से कितने वर्षों तक याद रखा गया?',en:'For how many years were the Vedas preserved through oral tradition?'},opts:{hi:['100 वर्ष','500 वर्ष','1000 वर्ष','3000+ वर्ष'],en:['100 years','500 years','1000 years','3000+ years']},ans:3,exp:{hi:'वेद हजारों वर्षों तक मौखिक परंपरा से सुरक्षित रहे -- यह मानव स्मृति का अद्भुत उदाहरण है।',en:'The Vedas were preserved through oral tradition for thousands of years -- a remarkable feat of human memory.'},cat:'history'},
  {q:{hi:'राजा जनक किस उपनिषद में प्रमुख हैं?',en:'King Janaka is prominent in which Upanishad?'},opts:{hi:['छांदोग्य','माण्डूक्य','बृहदारण्यक','मुंडक'],en:['Chandogya','Mandukya','Brihadaranyaka','Mundaka']},ans:2,exp:{hi:'राजा जनक बृहदारण्यक उपनिषद में प्रमुख हैं -- याज्ञवल्क्य के साथ उनके संवाद प्रसिद्ध हैं।',en:'King Janaka is prominent in the Brihadaranyaka Upanishad -- his dialogues with Yajnavalkya are famous.'},cat:'upanishad'},
  {q:{hi:'सोम यज्ञ में कौन सा पुजारी गाना गाता था?',en:'Which priest sang during the Soma sacrifice?'},opts:{hi:['होता','उद्गातृ','अध्वर्यु','ब्रह्मा'],en:['Hota','Udgatr','Adhvaryu','Brahma']},ans:1,exp:{hi:'उद्गातृ (Udgatr) पुजारी सामवेद के मंत्र राग में गाता था।',en:'The Udgatr priest sang the Samaveda mantras in melody during the Soma sacrifice.'},cat:'ritual'},
  {q:{hi:'अध्वर्यु पुजारी का काम क्या था?',en:'What was the role of the Adhvaryu priest?'},opts:{hi:['मंत्र गाना','यज्ञ की क्रियाएं करना और यजुर्वेद के मंत्र बोलना','दर्शन समझाना','यज्ञ की निगरानी करना'],en:['Singing mantras','Performing ritual actions and reciting Yajurveda mantras','Explaining philosophy','Overseeing the ritual']},ans:1,exp:{hi:'अध्वर्यु यजुर्वेद का पुजारी था जो यज्ञ में सारे काम करता था।',en:'The Adhvaryu was the Yajurveda priest who performed all the physical ritual actions.'},cat:'ritual'},
  {q:{hi:'प्रश्न उपनिषद में कितने सवाल हैं?',en:'How many questions are there in the Prashna Upanishad?'},opts:{hi:['3','5','6','10'],en:['3','5','6','10']},ans:2,exp:{hi:'प्रश्न उपनिषद में 6 सवाल और उनके जवाब हैं -- अथर्ववेद से संबंधित।',en:'The Prashna Upanishad has 6 questions and answers -- it belongs to the Atharvaveda.'},cat:'upanishad'},
  {q:{hi:'श्वेतकेतु कौन था?',en:'Who was Shvetaketu?'},opts:{hi:['एक राजा','उद्दालक का बेटा जिसे "तत् त्वम् असि" सिखाया गया','एक देव','एक ऋषि'],en:['A king','Uddalaka\'s son who was taught "Tat tvam asi"','A deity','A sage']},ans:1,exp:{hi:'श्वेतकेतु उद्दालक आरुणि का बेटा था। छांदोग्य उपनिषद में पिता ने उसे "तत् त्वम् असि" सिखाया।',en:'Shvetaketu was the son of Uddalaka Aruni. In the Chandogya Upanishad, his father taught him "Tat tvam asi."'},cat:'upanishad'},
  {q:{hi:'वेदों में "ऋत" का क्या अर्थ है?',en:'What does "Rita" mean in the Vedas?'},opts:{hi:['रात','ब्रह्मांडीय सत्य और व्यवस्था','एक देव','एक यज्ञ'],en:['Night','Cosmic truth and order','A deity','A sacrifice']},ans:1,exp:{hi:'ऋत = ब्रह्मांडीय सत्य, नैतिक व्यवस्था। यह धर्म का पूर्वज है। वरुण देव इसके रक्षक हैं।',en:'Rita = cosmic truth and moral order. It is the precursor of Dharma. Varuna is its guardian.'},cat:'philosophy'},
  {q:{hi:'चार आश्रम कौन से हैं?',en:'What are the four Ashramas?'},opts:{hi:['बाल्य, युवा, प्रौढ़, वृद्ध','ब्रह्मचर्य, गृहस्थ, वानप्रस्थ, संन्यास','ज्ञान, भक्ति, कर्म, राज','वेद, उपनिषद, पुराण, गीता'],en:['Childhood, Youth, Adult, Old age','Brahmacharya, Grihastha, Vanaprastha, Sannyasa','Jnana, Bhakti, Karma, Raja','Veda, Upanishad, Purana, Gita']},ans:1,exp:{hi:'चार आश्रम: ब्रह्मचर्य (छात्र), गृहस्थ (गृहस्वामी), वानप्रस्थ (वनवास), संन्यास (त्याग)।',en:'Four Ashramas: Brahmacharya (student), Grihastha (householder), Vanaprastha (forest dweller), Sannyasa (renunciant).'},cat:'philosophy'},
  {q:{hi:'पुरुष सूक्त किस ऋग्वेद मंडल में है?',en:'The Purusha Sukta is in which Mandala of the Rigveda?'},opts:{hi:['पहले','तीसरे','सातवें','दसवें'],en:['First','Third','Seventh','Tenth']},ans:3,exp:{hi:'पुरुष सूक्त ऋग्वेद के 10वें मंडल (10.90) में है -- ब्रह्मांड की उत्पत्ति का वर्णन।',en:'The Purusha Sukta is in the 10th Mandala of the Rigveda (10.90) -- describing the origin of the universe.'},cat:'veda'},
  {q:{hi:'वेदों की शाखा जो दर्शन से संबंधित है वह क्या है?',en:'Which layer of the Vedas deals with philosophy?'},opts:{hi:['संहिता','ब्राह्मण','आरण्यक','उपनिषद'],en:['Samhita','Brahmana','Aranyaka','Upanishad']},ans:3,exp:{hi:'उपनिषद = वेदों का दार्शनिक भाग। आत्मा, ब्रह्म, मोक्ष के सवालों के जवाब।',en:'Upanishads = the philosophical layer of the Vedas. They answer questions about the Self, Brahman, and liberation.'},cat:'veda'},
  {q:{hi:'आरण्यक ग्रंथ किसने लिखे?',en:'Who composed the Aranyaka texts?'},opts:{hi:['नगर में रहने वाले पुजारियों ने','वनों में ध्यान करते ऋषियों ने','राजाओं ने','देवताओं ने'],en:['City-dwelling priests','Sages meditating in forests','Kings','Deities']},ans:1,exp:{hi:'आरण्यक = "वन ग्रंथ।" वनों में ध्यान करते ऋषियों ने इन्हें लिखा। ये ब्राह्मणों और उपनिषदों के बीच की कड़ी हैं।',en:'Aranyakas = "forest texts." Composed by sages meditating in forests -- transitional texts between Brahmanas and Upanishads.'},cat:'veda'},
  {q:{hi:'निर्गुण ब्रह्म और सगुण ब्रह्म में क्या अंतर है?',en:'What is the difference between Nirguna and Saguna Brahman?'},opts:{hi:['एक पुरुष है, एक स्त्री','निर्गुण = गुणों के बिना, सगुण = गुणों के साथ','एक बड़ा है, एक छोटा','कोई अंतर नहीं'],en:['One is male, one is female','Nirguna = without qualities, Saguna = with qualities','One is bigger, one smaller','No difference']},ans:1,exp:{hi:'निर्गुण ब्रह्म = गुणों, रूप, नाम से परे शुद्ध चेतना। सगुण ब्रह्म = गुणों और रूप के साथ (जैसे विष्णु, शिव)।',en:'Nirguna Brahman = pure consciousness beyond all qualities and form. Saguna Brahman = with qualities and form (like Vishnu, Shiva).'},cat:'philosophy'},
  {q:{hi:'महामृत्युञ्जय मंत्र किस वेद में है?',en:'The Mahamrityunjaya Mantra is in which Veda?'},opts:{hi:['ऋग्वेद','सामवेद','यजुर्वेद','अथर्ववेद'],en:['Rigveda','Samaveda','Yajurveda','Atharvaveda']},ans:0,exp:{hi:'महामृत्युञ्जय मंत्र ऋग्वेद 7.59.12 में है -- वशिष्ठ मंडल। यजुर्वेद में भी आता है।',en:'The Mahamrityunjaya Mantra is in Rigveda 7.59.12 -- Vashistha\'s Mandala. Also appears in the Yajurveda.'},cat:'mantra'},
  {q:{hi:'शांति पाठ "ॐ सह नाववतु..." किस उपनिषद का है?',en:'The Shanti Patha "Om saha naavavatu..." belongs to which Upanishad?'},opts:{hi:['ईशावास्य','तैत्तिरीय','माण्डूक्य','केन'],en:['Isha','Taittiriya','Mandukya','Kena']},ans:1,exp:{hi:'"ॐ सह नाववतु" तैत्तिरीय उपनिषद का शांति पाठ है -- यजुर्वेद से संबंधित।',en:'"Om saha naavavatu" is the Shanti Patha of the Taittiriya Upanishad -- belonging to the Yajurveda.'},cat:'mantra'},
  {q:{hi:'चार पुरुषार्थ कौन से हैं?',en:'What are the four Purusharthas (aims of life)?'},opts:{hi:['ज्ञान, भक्ति, कर्म, मोक्ष','धर्म, अर्थ, काम, मोक्ष','सत्य, अहिंसा, प्रेम, शांति','वेद, उपनिषद, गीता, पुराण'],en:['Jnana, Bhakti, Karma, Moksha','Dharma, Artha, Kama, Moksha','Truth, Non-violence, Love, Peace','Veda, Upanishad, Gita, Purana']},ans:1,exp:{hi:'चार पुरुषार्थ: धर्म (कर्तव्य), अर्थ (धन), काम (इच्छा), मोक्ष (मुक्ति)।',en:'Four Purusharthas: Dharma (duty), Artha (wealth), Kama (desire), Moksha (liberation).'},cat:'philosophy'},
  {q:{hi:'"योगः कर्मसु कौशलम्" किस ग्रंथ में है?',en:'"Yogah karmasu kaushalam" -- in which scripture?'},opts:{hi:['ऋग्वेद','बृहदारण्यक उपनिषद','भगवद्गीता','मुंडकोपनिषद'],en:['Rigveda','Brihadaranyaka Upanishad','Bhagavad Gita','Mundaka Upanishad']},ans:2,exp:{hi:'"योगः कर्मसु कौशलम्" = "योग यानी हर काम को कुशलता से करना।" भगवद्गीता 2.50।',en:'"Yogah karmasu kaushalam" = "Yoga is excellence in action." Bhagavad Gita 2.50.'},cat:'philosophy'},
  {q:{hi:'सरस्वती नदी का उल्लेख किस वेद में सबसे ज़्यादा है?',en:'Which Veda mentions the Saraswati river most prominently?'},opts:{hi:['ऋग्वेद','सामवेद','यजुर्वेद','अथर्ववेद'],en:['Rigveda','Samaveda','Yajurveda','Atharvaveda']},ans:0,exp:{hi:'सरस्वती नदी का उल्लेख ऋग्वेद में सबसे ज़्यादा है -- वैदिक सभ्यता की पवित्र नदी।',en:'The Saraswati river is most prominently mentioned in the Rigveda -- the sacred river of Vedic civilization.'},cat:'history'},
  {q:{hi:'षड्दर्शन (6 भारतीय दर्शन) में वेदांत क्या है?',en:'What is Vedanta among the six classical Indian philosophies?'},opts:{hi:['पहला दर्शन','उपनिषदों पर आधारित दर्शन','केवल एक मंत्र','एक यज्ञ'],en:['The first philosophy','Philosophy based on the Upanishads','Just one mantra','A ritual']},ans:1,exp:{hi:'वेदांत = "वेद का अंत (सार)।" उपनिषदों पर आधारित। शंकराचार्य का अद्वैत वेदांत सबसे प्रसिद्ध।',en:'Vedanta = "end (essence) of the Vedas." Based on the Upanishads. Shankaracharya\'s Advaita Vedanta is most famous.'},cat:'philosophy'},
  {q:{hi:'तैत्तिरीय उपनिषद किस वेद से है?',en:'The Taittiriya Upanishad belongs to which Veda?'},opts:{hi:['ऋग्वेद','सामवेद','यजुर्वेद','अथर्ववेद'],en:['Rigveda','Samaveda','Yajurveda','Atharvaveda']},ans:2,exp:{hi:'तैत्तिरीय उपनिषद कृष्ण यजुर्वेद से है -- पाँच कोश (शरीर की पाँच परतें) का वर्णन।',en:'Taittiriya Upanishad belongs to Krishna Yajurveda -- it describes the Pancha Kosha (five sheaths of the body).'},cat:'upanishad'},
  {q:{hi:'पंच कोश (पाँच कोश) क्या हैं?',en:'What are the Pancha Kosha (five sheaths)?'},opts:{hi:['पाँच इंद्रियां','अन्नमय, प्राणमय, मनोमय, विज्ञानमय, आनंदमय कोश','पाँच तत्व','पाँच देव'],en:['Five senses','Annamaya, Pranamaya, Manomaya, Vijnanamaya, Anandamaya Kosha','Five elements','Five deities']},ans:1,exp:{hi:'पंच कोश = अन्नमय (भौतिक), प्राणमय (जीवन-शक्ति), मनोमय (मन), विज्ञानमय (बुद्धि), आनंदमय (आनंद) कोश।',en:'Pancha Kosha = Annamaya (physical), Pranamaya (life-force), Manomaya (mind), Vijnanamaya (intellect), Anandamaya (bliss) sheaths.'},cat:'philosophy'},
  {q:{hi:'वृत्र कौन था?',en:'Who was Vritra?'},opts:{hi:['एक ऋषि','एक अजगर जिसे इंद्र ने मारा','एक देव','एक उपनिषद का पात्र'],en:['A sage','A serpent slain by Indra','A deity','A character in an Upanishad']},ans:1,exp:{hi:'वृत्र एक अजगर (राक्षस) था। इंद्र ने वज्र से उसे मारकर ब्रह्मांडीय जल आज़ाद किया -- ऋग्वेद की सबसे प्रसिद्ध कथा।',en:'Vritra was a serpent demon. Indra slew him with his thunderbolt to release the cosmic waters -- Rigveda\'s most famous myth.'},cat:'deity'},
  {q:{hi:'गोपथ ब्राह्मण किस वेद से है?',en:'Gopatha Brahmana belongs to which Veda?'},opts:{hi:['ऋग्वेद','सामवेद','यजुर्वेद','अथर्ववेद'],en:['Rigveda','Samaveda','Yajurveda','Atharvaveda']},ans:3,exp:{hi:'गोपथ ब्राह्मण अथर्ववेद का एकमात्र ब्राह्मण ग्रंथ है।',en:'Gopatha Brahmana is the only Brahmana text of the Atharvaveda.'},cat:'veda'},
  {q:{hi:'पंचाग्नि विद्या किस उपनिषद में है?',en:'The Panchagni Vidya (Five Fires) is in which Upanishad?'},opts:{hi:['माण्डूक्य','ईशावास्य','छांदोग्य','मुंडक'],en:['Mandukya','Isha','Chandogya','Mundaka']},ans:2,exp:{hi:'पंचाग्नि विद्या छांदोग्य उपनिषद में है -- पुनर्जन्म और आत्मा की यात्रा का विवरण।',en:'Panchagni Vidya is in the Chandogya Upanishad -- it describes reincarnation and the journey of the soul.'},cat:'upanishad'},
  {q:{hi:'वेदांत के अनुसार जगत क्या है?',en:'According to Vedanta, what is Jagat (the world)?'},opts:{hi:['पूर्णतः वास्तविक','ब्रह्म में अध्यस्त -- सापेक्ष सत्य','पूर्णतः भ्रम','ईश्वर की रचना'],en:['Completely real','Superimposed on Brahman -- relatively real','Completely illusory','God\'s creation']},ans:1,exp:{hi:'अद्वैत वेदांत के अनुसार जगत ब्रह्म में अध्यस्त (superimposed) है -- न पूर्णतः सत्य, न पूर्णतः असत्य।',en:'According to Advaita Vedanta, the world is superimposed on Brahman -- neither completely real nor completely unreal.'},cat:'philosophy'},
  {q:{hi:'पैप्पलाद संहिता किस वेद की है?',en:'The Paippalada Samhita belongs to which Veda?'},opts:{hi:['ऋग्वेद','सामवेद','यजुर्वेद','अथर्ववेद'],en:['Rigveda','Samaveda','Yajurveda','Atharvaveda']},ans:3,exp:{hi:'पैप्पलाद संहिता अथर्ववेद की एक पुरानी शाखा है जो कश्मीरी पांडुलिपियों से 20वीं सदी में मिली।',en:'The Paippalada Samhita is an older branch of the Atharvaveda, rediscovered from Kashmiri manuscripts in the 20th century.'},cat:'veda'},
  {q:{hi:'कौषीतकि उपनिषद में इंद्र ने क्या सिखाया?',en:'What did Indra teach in the Kaushitaki Upanishad?'},opts:{hi:['यज्ञ विधि','प्राण ही ब्रह्म है -- मुझे जानो','गायत्री मंत्र','नेति नेति'],en:['Ritual method','Prana is Brahman -- know me','Gayatri Mantra','Neti Neti']},ans:1,exp:{hi:'कौषीतकि उपनिषद में इंद्र ने प्रतर्दन को कहा -- "मुझे जानो। प्राण ही ब्रह्म है।"',en:'In Kaushitaki, Indra told Pratardana -- "Know me. Prana is Brahman."'},cat:'upanishad'},
  {q:{hi:'स्वेताश्वतर उपनिषद किस देव को समर्पित है?',en:'The Shvetashvatara Upanishad is dedicated to which deity?'},opts:{hi:['विष्णु','ब्रह्मा','शिव (रुद्र)','इंद्र'],en:['Vishnu','Brahma','Shiva (Rudra)','Indra']},ans:2,exp:{hi:'श्वेताश्वतर उपनिषद शिव (रुद्र) को समर्पित है -- यजुर्वेद से। यह शैव दर्शन का आधार है।',en:'The Shvetashvatara Upanishad is dedicated to Shiva (Rudra) -- from the Yajurveda. It is the basis of Shaiva philosophy.'},cat:'upanishad'},
  {q:{hi:'नचिकेता ने यम से क्या मांगा?',en:'What did Nachiketa ask from Yama?'},opts:{hi:['सोना','आत्मा का ज्ञान','लंबी उम्र','स्वर्ग'],en:['Gold','Knowledge of the Self/Soul','Long life','Heaven']},ans:1,exp:{hi:'नचिकेता ने यम (मृत्यु देव) से आत्मा के रहस्य की जानकारी मांगी -- कठ उपनिषद की मशहूर कहानी।',en:'Nachiketa asked Yama (death god) for the secret of the Self -- the famous story of the Katha Upanishad.'},cat:'upanishad'},
  {q:{hi:'ऋग्वेद के मंडल 2-7 को क्या कहते हैं?',en:'What are Mandalas 2-7 of the Rigveda called?'},opts:{hi:['नए मंडल','पारिवारिक मंडल (Family Books)','राजा के मंडल','देव मंडल'],en:['New Mandalas','Family Books','King\'s Mandalas','God Mandalas']},ans:1,exp:{hi:'मंडल 2-7 को "पारिवारिक मंडल" (Family Books) कहते हैं क्योंकि हर एक किसी ऋषि परिवार ने लिखा।',en:'Mandalas 2-7 are called "Family Books" because each was composed by a specific sage family lineage.'},cat:'veda'},
  {q:{hi:'"तमसो मा ज्योतिर्गमय" किस उपनिषद में है?',en:'"Tamaso ma jyotirgamaya" is from which Upanishad?'},opts:{hi:['छांदोग्य','ईशावास्य','बृहदारण्यक','माण्डूक्य'],en:['Chandogya','Isha','Brihadaranyaka','Mandukya']},ans:2,exp:{hi:'"तमसो मा ज्योतिर्गमय, मृत्योर्मा अमृतं गमय" -- बृहदारण्यक उपनिषद 1.3.28।',en:'"Tamaso ma jyotirgamaya, mrityor ma amritam gamaya" -- Brihadaranyaka Upanishad 1.3.28.'},cat:'mantra'},
  {q:{hi:'"सर्वे भवन्तु सुखिनः" किस वेद की प्रार्थना है?',en:'"Sarve Bhavantu Sukhinah" -- from which Vedic tradition?'},opts:{hi:['ऋग्वेद','यजुर्वेद -- बृहदारण्यक उपनिषद','सामवेद','अथर्ववेद'],en:['Rigveda','Yajurveda -- Brihadaranyaka Upanishad','Samaveda','Atharvaveda']},ans:1,exp:{hi:'"सर्वे भवन्तु सुखिनः" -- "सभी सुखी हों" -- यह बृहदारण्यक उपनिषद से जुड़ी प्रार्थना है।',en:'"Sarve Bhavantu Sukhinah" -- "May all be happy" -- this prayer is associated with the Brihadaranyaka Upanishad tradition.'},cat:'mantra'},
  {q:{hi:'भारतीय शास्त्रीय संगीत में "राग" की जड़ें कहाँ हैं?',en:'Where are the roots of "Raga" in Indian classical music?'},opts:{hi:['ऋग्वेद की ऋचाओं में','सामवेद के "सामन" में','यजुर्वेद के यज्ञ मंत्रों में','अथर्ववेद के रक्षा मंत्रों में'],en:['In the Rigveda hymns','In the "Saman" of the Samaveda','In the Yajurveda ritual mantras','In the Atharvaveda protective spells']},ans:1,exp:{hi:'सामवेद के सामन (राग) ही भारतीय शास्त्रीय संगीत के रागों का आधार हैं।',en:'The Saman melodies of the Samaveda are the foundation of ragas in Indian classical music.'},cat:'veda'},

function renderUpDeep(u,color){
  const tabs=[{k:'story',l:{hi:'कहानी',en:'Story'}},{k:'lessons',l:{hi:'सीख',en:'Lessons'}},{k:'verse',l:{hi:'श्लोक',en:'Verse'}},{k:'notes',l:{hi:'नोट्स',en:'Notes'}}];
  let content='';
  if(activeUpTab==='story'){
    content=`<div class="up-story">${L(u.story).split('\n\n').join('</div><div class="up-story">').split('\n').join('<br>')}</div>`;
  }else if(activeUpTab==='lessons'){
    content=`<div class="up-lesson-grid">${u.lessons.map(l=>`<div class="up-lesson" style="border-left-color:${color}"><div class="up-lesson-icon">${l.icon}</div><div class="up-lesson-title">${L(l.t)}</div><div class="up-lesson-text">${L(l.d)}</div></div>`).join('')}</div>`;
  }else if(activeUpTab==='verse'){
    content=`<div class="up-verse-box"><div class="up-verse-sanskrit">${u.verse.s}</div><div class="up-verse-divider"></div><div class="up-verse-arth">${L(u.verse.a)}</div><div class="up-verse-src">${u.verse.src}</div></div>`;
  }else if(activeUpTab==='notes'){
    content=`<div class="notes-wrap"><textarea class="notes-textarea" id="note_up_${u.id}" placeholder="${lang==='hi'?`${L(u.name)} के बारे में नोट्स...`:`Notes on ${L(u.name)}...`}">${notes['up_'+u.id]||''}</textarea><div class="notes-actions"><button class="notes-save" onclick="saveNote('up_${u.id}')" style="background:${color}">${lang==='hi'?'💾 सेव करें':'💾 Save'}</button><span class="notes-saved" id="note_saved_up_${u.id}">✅</span></div></div>`;
  }
  return `
  <div class="up-deep" style="margin-top:14px">
    <div class="up-deep-header">
      <div class="up-mv-box">
        <div class="up-mv-sanskrit">${u.mv}</div>
        <div class="up-mv-trans">${L(u.mv_arth)}</div>
        <div class="up-mv-source">${L(u.name)} -- ${L(u.veda)}</div>
      </div>
      <div class="up-deep-meta" style="margin-top:10px">
        <span>📖 ${L(u.chapters)}</span>
        <span>📝 ${L(u.verses)}</span>
        <span>⭐ ${L(u.level)}</span>
        <span style="cursor:pointer" onclick="toggleBM('up_${u.id}')">${bookmarks.includes('up_'+u.id)?'🔖 Saved':'🏷 Save'}</span>
      </div>
    </div>
    <div class="up-tabs">
      ${tabs.map(t=>`<button class="up-tab ${activeUpTab===t.k?'active':''}" onclick="setUpTab('${t.k}')">${L(t.l)}</button>`).join('')}
    </div>
    <div class="up-content">${content}</div>
  </div>`;
}

function renderQuiz(){
  const q=QUIZ[quizState.idx];
  if(quizState.done){
    const pct=Math.round(quizState.score/QUIZ.length*100);
    $('app').innerHTML=`<div class="quiz-wrap"><div class="quiz-card"><div class="qz-result">
      <div style="font-size:36px;margin-bottom:12px">${pct>=80?'🏆':pct>=50?'👍':'📖'}</div>
      <div class="qz-result-num">${quizState.score}/${QUIZ.length}</div>
      <div class="qz-result-msg">${lang==='hi'?(pct>=80?'शाबाश! आप वेद विशेषज्ञ हैं 🎉':pct>=50?'अच्छा प्रयास! और पढ़ें 📚':'फिर कोशिश करें! वेद पढ़ें 🙏'):(pct>=80?'Excellent! You are a Veda expert 🎉':pct>=50?'Good effort! Read more 📚':'Try again! Study the Vedas 🙏')}</div>
      <div style="margin:16px 0;padding:16px;background:var(--cream);border-radius:var(--rs);text-align:left">
        ${QUIZ.map((q,i)=>`<div style="font-size:12px;padding:4px 0;color:var(--soft)">${i+1}. ${L(q.q)} -- <span style="color:var(--s);font-weight:700">${(lang==='hi'?q.opts.hi:q.opts.en)[q.ans]}</span></div>`).join('')}
      </div>
      <button class="qz-restart" onclick="quizState={idx:0,score:0,answered:false,sel:null,done:false};QUIZ=getRandomQuiz();renderQuiz()">${lang==='hi'?'🔄 फिर खेलें':'🔄 Play Again'}</button>
    </div></div></div>`;
    return;
  }
  $('app').innerHTML=`<div class="quiz-wrap"><div class="quiz-card">
    <div class="qz-top">
      <span class="qz-q-num">${lang==='hi'?'सवाल':'Question'} ${quizState.idx+1} / ${QUIZ.length}</span>
      <span class="qz-score-badge">${lang==='hi'?'स्कोर':'Score'}: ${quizState.score} | ${lang==='hi'?'प्रश्न':'Q'} pool: ${QUIZ_POOL.length}</span>
    </div>
    <div class="qz-bar"><div class="qz-bar-fill" style="width:${quizState.idx/QUIZ.length*100}%"></div></div>
    ${q.shloka?`<div class="qz-shloka">${q.shloka}</div>`:''}
    <div class="qz-q">${L(q.q)}</div>
    <div class="qz-opts">
      ${(lang==='hi'?q.opts.hi:q.opts.en).map((opt,i)=>{
        let cls='qz-opt';
        if(quizState.answered){cls+=i===q.ans?' correct':i===quizState.sel?' wrong':'';}
        return`<button class="${cls}" ${quizState.answered?'disabled':''} onclick="answerQ(${i})">${opt}</button>`;
      }).join('')}
    </div>
    ${quizState.answered?`<div class="qz-fb ${quizState.sel===q.ans?'correct':'wrong'}">${quizState.sel===q.ans?'✅ '+( lang==='hi'?'सही जवाब!':'Correct!'):'❌ '+(lang==='hi'?'गलत।':'Wrong.')} -- ${L(q.exp)}</div><button class="qz-next" onclick="nextQ()">${quizState.idx===QUIZ.length-1?(lang==='hi'?'नतीजा देखें →':'See Result →'):(lang==='hi'?'अगला सवाल →':'Next Question →')}</button>`:''}
  </div></div>`;
}
function answerQ(i){if(quizState.answered)return;quizState.answered=true;quizState.sel=i;if(i===QUIZ[quizState.idx].ans)quizState.score++;renderQuiz()}
function nextQ(){quizState.idx++;if(quizState.idx>=QUIZ.length)quizState.done=true;else{quizState.answered=false;quizState.sel=null;}renderQuiz()}

/* ────────── SEARCH ────────── */
let searchIdx=[];
function buildSearch(){
  searchIdx=[];
  VEDAS.forEach(v=>{
    searchIdx.push({l:L(v.name)+' -- '+L(v.sub),t:L(v.name),fn:()=>{setVeda(VEDAS.indexOf(v));showPage('home')}});
    Object.keys(v.ci).forEach(k=>{if(k.length<25)searchIdx.push({l:k,t:L(v.name),fn:()=>{setVeda(VEDAS.indexOf(v));activeConcept=k;showPage('home')}})});
  });
  UPANISHADS.forEach(u=>searchIdx.push({l:L(u.name),t:L(u.veda),fn:()=>{setUpIdx(UPANISHADS.indexOf(u));showPage('upanishads')}}));
  RISHIS.forEach(r=>searchIdx.push({l:L(r.name)+' '+(lang==='hi'?'ऋषि':'Sage'),t:L(r.veda),fn:()=>{setRishi(RISHIS.indexOf(r));showPage('rishis')}}));

function doSearch(q){
  if(!q.trim()){$('sr').style.display='none';return}
  const m=searchIdx.filter(i=>i.l.toLowerCase().includes(q.toLowerCase())).slice(0,8);
  const el=$('sr');
  if(!m.length){el.innerHTML=`<div class="sr-item" style="color:var(--muted)">${lang==='hi'?'कोई नतीजा नहीं':'No results found'}</div>`;el.style.display='block';return}
  el.innerHTML=m.map((x,i)=>`<div class="sr-item" onclick="searchIdx.filter(it=>it.l.toLowerCase().includes('${q.toLowerCase()}'))[${i}]?.fn();$('si').value='';$('sr').style.display='none'">${x.l}<span class="sr-tag">${x.t}</span></div>`).join('');
  el.style.display='block';
}

function jargonHTML(word,defn){
  return `<span class="jargon" tabindex="0">${word}<span class="jargon-popup">${defn}</span></span>`;
}

function addJargon(text){
  let out=text;
  Object.keys(JARGON).forEach(k=>{
    const re=new RegExp('(?<![\w>])'+k+'(?![\w<]|[^<]*>)','g');
    out=out.replace(re, jargonHTML(k, JARGON[k]));
  });
  return out;
}

let openDay=null;

  const allDone=doneCount===7;
  $('app').innerHTML=`
  <div class="challenge-hero">
    <h2>🗓 ${isHi?'7-दिन की वेद यात्रा':'7-Day Veda Journey'}</h2>
    <p>${isHi?'शुरू से शुरू करें -- रोज़ एक छोटा सबक, एक मंत्र, एक सवाल। 7 दिन में वेदों की नींव।':'Start from zero -- one small lesson daily, one mantra, one reflection. 7 days to understand the foundation of the Vedas.'}</p>
    <div class="challenge-stats">
      <div class="cs-item"><div class="cs-num">${doneCount}/7</div><div class="cs-label">${isHi?'दिन पूरे':'Days done'}</div></div>

      <div class="cs-item"><div class="cs-num">${7-doneCount}</div><div class="cs-label">${isHi?'बचे हुए':'Remaining'}</div></div>
    </div>
  </div>

  ${allDone?`<div class="challenge-complete-banner">
    <div class="ccb-icon">🏆</div>
    <div class="ccb-title">${isHi?'शाबाश! 7 दिन पूरे!':'Congratulations! 7 Days Complete!'}</div>
    <div class="ccb-text">${isHi?'आपने वेदों की नींव समझ ली। अब उपनिषद और महावाक्य पेज पर और गहराई से जानें।':'You\'ve understood the foundation of the Vedas. Now explore the Upanishads and Mahavakya pages for deeper wisdom.'}</div>
  </div>`:''}

  <div class="day-list">
    ${CHALLENGE_DAYS.map((day,i)=>{
      const done=completedDays[i];
      const isOpen=openDay===i;
      const isLocked=i>0&&!completedDays[i-1]&&!done;
      const isActive=!done&&!isLocked&&openDay===null||isOpen;
      return `<div class="day-card ${done?'done':''} ${isOpen?'active-day':''} ${isLocked?'locked':''}" id="day-${i}">
        <div class="day-header" onclick="${isLocked?'':'toggleDay('+i+')'}" style="${isLocked?'cursor:not-allowed':''}">
          <div class="day-num-badge" style="background:${done?'#E8F5E9':isOpen?'var(--saffron-light)':'var(--cream)'};color:${done?'#2E7D32':isOpen?'var(--saffron)':'var(--muted)'}">
            ${done?'✓':i+1}
          </div>
          <div class="day-info">
            <div class="day-title" style="${done?'color:#2E7D32':isOpen?'color:var(--saffron)':''}">${isHi?'दिन':'Day'} ${i+1} -- ${L(day.title)}</div>
            <div class="day-subtitle">${L(day.subtitle)}</div>
          </div>
          <div class="day-status">${isLocked?'🔒':done?'✅':isOpen?'▲':'▶'}</div>
        </div>
        <div class="day-content ${isOpen?'open':''}">
          <div class="day-lesson">${L(day.lesson).split('\n\n').join('</div><div class="day-lesson">').split('\n').join('<br>')}</div>

            <div class="day-mantra-sk">${day.mantra.sk}</div>
            <div class="day-mantra-arth">${L(day.mantra.arth)}</div>
            <div style="font-size:10px;color:var(--muted);margin-top:4px;font-style:italic">${day.mantra.src}</div>
          </div>
          <div class="day-reflect">💭 ${isHi?'आज का सवाल:':'Today\'s reflection:'} ${L(day.reflect)}</div>
          ${done
            ? `<div class="day-already-done">✅ ${isHi?'यह दिन पूरा हो गया!':'This day is complete!'}</div>`
            : `<button class="day-complete-btn" onclick="completeDay(${i})" style="background:var(--saffron)">✅ ${isHi?'मैंने यह पाठ पढ़ लिया':'I have completed this lesson'}</button>`}
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

function toggleDay(i){
  openDay = openDay===i ? null : i;
  renderChallenge();
}

function completeDay(i){
  readProgress['day_'+i]=!readProgress['day_'+i]; save('vg_prog',readProgress);
  openDay = i<6 ? i+1 : null;
  renderChallenge();
  if(i<6){
    setTimeout(()=>{
      const next=document.getElementById('day-'+(i+1));
      if(next) next.scrollIntoView({behavior:'smooth',block:'start'});
    },200);
  }
  toast(lang==='hi'?`🎉 दिन ${i+1} पूरा! शाबाश!`:`🎉 Day ${i+1} complete! Great job!`);
}
