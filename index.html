<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>वेद ज्ञान -- Veda Gyan</title>
<link href="https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Sanskrit:ital@0;1&family=Noto+Sans+Devanagari:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── ROOT ── */
:root{
  --s:#E8621A;--sl:#FDF0E8;--g:#C8900A;--gl:#FDF6E3;
  --cream:#FAF6EF;--ink:#1C1409;--soft:#4A3728;--muted:#8B7355;
  --bd:rgba(200,144,10,.2);--bds:rgba(200,144,10,.45);
  --w:#fff;--r:14px;--rs:9px;--fs:14px;
  --shadow:0 2px 12px rgba(0,0,0,.07);
  --shadow-lg:0 8px 32px rgba(0,0,0,.12);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans Devanagari','Inter',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;font-size:var(--fs);overflow-x:hidden}
.en body,.en p,.en h1,.en h2,.en h3,.en h4,.en .badge,.en .chip,.en small{font-family:'Inter',sans-serif}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pop{0%{transform:scale(.85);opacity:0}80%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
@keyframes glow{0%,100%{box-shadow:0 0 8px rgba(232,98,26,.3)}50%{box-shadow:0 0 20px rgba(232,98,26,.6)}}
.fade-up{animation:fadeUp .35s ease both}
.pop{animation:pop .25s ease both}
.card-enter{animation:fadeUp .3s ease both}

/* ── HEADER ── */
.header{
  background:linear-gradient(135deg,#1C0A02 0%,#3D1A05 60%,#1C0A02 100%);
  border-bottom:1px solid rgba(200,144,10,.3);
  padding:.9rem 1.5rem;display:flex;align-items:center;gap:12px;
  position:sticky;top:0;z-index:300;flex-wrap:wrap;
  box-shadow:0 2px 20px rgba(0,0,0,.3);
}
.header-om{
  font-family:'Tiro Devanagari Sanskrit',serif;
  font-size:34px;color:#FFD700;line-height:1;
  text-shadow:0 0 20px rgba(255,215,0,.5);
  animation:glow 3s ease-in-out infinite;
}
.header-text h1{font-size:18px;font-weight:700;color:#FFE8C0;letter-spacing:.5px}
.header-text p{font-size:11px;color:rgba(255,215,0,.6);margin-top:1px}
.header-tools{margin-left:auto;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.tool-btn{
  padding:5px 11px;border-radius:20px;
  border:1px solid rgba(255,215,0,.3);
  background:rgba(255,255,255,.08);
  cursor:pointer;font-size:12px;color:#FFE8C0;
  transition:all .2s;font-family:inherit;white-space:nowrap;backdrop-filter:blur(8px);
}
.tool-btn:hover,.tool-btn.active{background:rgba(255,215,0,.2);border-color:rgba(255,215,0,.6);color:#FFD700}

/* ── NAV ── */
.main-nav{
  display:flex;gap:0;
  background:var(--w);
  border-bottom:1px solid var(--bd);
  position:sticky;top:57px;z-index:200;
  overflow-x:auto;box-shadow:var(--shadow);
}
.main-nav::-webkit-scrollbar{height:0}
.nav-tab{
  padding:10px 16px;border:none;background:none;cursor:pointer;
  font-size:12px;color:var(--muted);font-family:inherit;
  border-bottom:2px solid transparent;white-space:nowrap;
  transition:all .2s;position:relative;
}
.nav-tab::after{content:'';position:absolute;bottom:-1px;left:50%;right:50%;height:2px;background:var(--s);transition:all .2s;border-radius:2px}
.nav-tab.active::after{left:0;right:0}
.nav-tab.active{color:var(--s);font-weight:600}
.nav-tab:hover{color:var(--ink)}
.nav-badge{
  display:inline-block;background:var(--s);color:#fff;
  font-size:9px;border-radius:10px;padding:1px 5px;margin-left:4px;vertical-align:middle;
}

.container{max-width:940px;margin:0 auto;padding:1.4rem}

/* ── SEARCH ── */
.search-wrap{position:relative;margin-bottom:1.2rem}
.search-input{
  width:100%;padding:11px 16px 11px 42px;
  border:1.5px solid var(--bds);border-radius:var(--r);
  background:var(--w);font-size:13px;font-family:inherit;
  outline:none;transition:all .2s;box-shadow:var(--shadow);
}
.search-input:focus{border-color:var(--g);box-shadow:0 0 0 3px rgba(200,144,10,.1)}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px}
.search-results{
  background:var(--w);border:1px solid var(--bds);
  border-radius:var(--rs);margin-top:4px;display:none;
  max-height:260px;overflow-y:auto;box-shadow:var(--shadow-lg);
  position:absolute;width:100%;z-index:100;
}
.sr-item{padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--bd);font-size:13px;display:flex;justify-content:space-between;align-items:center;transition:background .15s}
.sr-item:hover{background:var(--gl)}
.sr-item:last-child{border-bottom:none}
.sr-tag{font-size:10px;color:var(--muted);background:var(--cream);padding:2px 8px;border-radius:10px;flex-shrink:0;margin-left:8px}

/* ── DAILY VERSE ── */
.daily-banner{
  background:linear-gradient(135deg,#1C0A02 0%,#4A1C08 50%,#2C0E04 100%);
  border-radius:var(--r);padding:1.4rem 1.6rem;margin-bottom:1.2rem;
  color:#fff;position:relative;overflow:hidden;
  box-shadow:var(--shadow-lg);border:1px solid rgba(200,144,10,.3);
}
.daily-banner::before{
  content:'ॐ';position:absolute;right:-10px;top:50%;transform:translateY(-50%);
  font-size:100px;opacity:.05;font-family:'Tiro Devanagari Sanskrit',serif;
  pointer-events:none;
}
.daily-banner::after{
  content:'';position:absolute;top:0;left:0;right:0;bottom:0;
  background:linear-gradient(45deg,transparent 30%,rgba(255,215,0,.03) 50%,transparent 70%);
  animation:shimmer 4s linear infinite;background-size:800px 100%;
}
.daily-label{font-size:10px;letter-spacing:2px;color:rgba(255,215,0,.7);text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.daily-dot{width:6px;height:6px;background:#FFD700;border-radius:50%;animation:pulse 2s infinite}
.daily-shloka{font-family:'Tiro Devanagari Sanskrit',serif;font-size:16px;line-height:2;color:#FFE8C0;margin-bottom:10px}
.daily-meaning{font-size:13px;color:rgba(255,255,255,.78);line-height:1.75}
.daily-footer{display:flex;justify-content:space-between;align-items:center;margin-top:10px}
.daily-source{font-size:11px;color:rgba(255,215,0,.5);font-style:italic}
.daily-actions{display:flex;gap:8px}
.daily-btn{
  background:rgba(255,215,0,.12);border:1px solid rgba(255,215,0,.3);
  color:#FFD700;border-radius:20px;padding:4px 12px;font-size:11px;
  cursor:pointer;font-family:inherit;transition:all .2s;
}
.daily-btn:hover{background:rgba(255,215,0,.22)}

/* ── PROGRESS BAR ── */
.progress-wrap{margin-bottom:1.2rem}
.progress-label{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:5px}
.progress-bar{height:4px;background:var(--bd);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1)}

/* ── VEDA TABS ── */
.veda-tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.2rem}
.tab-btn{
  background:var(--w);border:1.5px solid var(--bd);border-radius:var(--r);
  padding:13px 8px;cursor:pointer;text-align:center;
  transition:all .22s cubic-bezier(.4,0,.2,1);font-family:inherit;
  box-shadow:var(--shadow);position:relative;overflow:hidden;
}
.tab-btn::before{
  content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent,rgba(255,255,255,.4));
  opacity:0;transition:opacity .2s;
}
.tab-btn:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.tab-btn:hover::before{opacity:1}
.tab-btn.active{border-width:2px;transform:translateY(-1px);box-shadow:var(--shadow-lg)}
.tab-icon{font-size:24px;display:block;margin-bottom:5px}
.tab-name{font-size:13px;font-weight:600;color:var(--ink)}
.tab-sub{font-size:10px;color:var(--muted);margin-top:2px}
.tab-bm{font-size:10px;margin-top:4px;min-height:14px}

/* ── CARDS ── */
.card{
  background:var(--w);border:1px solid var(--bd);
  border-radius:var(--r);padding:1.4rem;margin-bottom:1rem;
  box-shadow:var(--shadow);transition:box-shadow .2s;
}
.card:hover{box-shadow:var(--shadow-lg)}
.card-header{
  display:flex;gap:16px;align-items:flex-start;
  padding-bottom:1.2rem;border-bottom:1px solid var(--bd);margin-bottom:1.2rem;
}
.veda-emblem{
  width:58px;height:58px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:26px;flex-shrink:0;box-shadow:0 4px 12px rgba(0,0,0,.1);
}
.veda-meta h2{font-size:19px;font-weight:700;margin-bottom:5px}
.veda-meta p{font-size:13px;color:var(--soft);line-height:1.85}
.badges{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500}
.veda-actions{display:flex;gap:8px;margin-top:8px}
.icon-btn{
  background:var(--cream);border:1px solid var(--bds);
  border-radius:8px;padding:5px 10px;cursor:pointer;font-size:13px;
  transition:all .15s;font-family:inherit;color:var(--muted);
}
.icon-btn:hover{background:var(--gl);color:var(--g)}
.icon-btn.active{background:var(--gl);color:var(--g);border-color:var(--g)}

/* ── FACTS ── */
.facts-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.2rem}
.fact-box{
  border-radius:var(--rs);padding:12px;text-align:center;
  transition:transform .15s;cursor:default;
}
.fact-box:hover{transform:scale(1.02)}
.fact-num{font-size:22px;font-weight:700;font-family:'Inter',sans-serif}
.fact-label{font-size:10px;color:var(--muted);margin-top:3px;line-height:1.4}

/* ── SECTION NAV ── */
.section-label{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.8px;margin-bottom:10px;text-transform:uppercase}
.section-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1.2rem}
.sec-card{
  background:var(--cream);border:1.5px solid var(--bd);border-radius:var(--rs);
  padding:11px 8px;cursor:pointer;transition:all .2s;text-align:center;
  font-family:inherit;position:relative;overflow:hidden;
}
.sec-card:hover{transform:translateY(-1px);box-shadow:var(--shadow)}
.sec-card.active{border-width:2px;background:var(--w)}
.sec-card-icon{font-size:18px;margin-bottom:4px}
.sec-card-name{font-size:11px;font-weight:700;color:var(--ink)}
.sec-card-sub{font-size:10px;color:var(--muted);margin-top:2px}

/* ── DETAIL BOXES ── */
.detail-box{
  background:var(--cream);border-left:3px solid;
  border-radius:0 var(--rs) var(--rs) 0;padding:1rem 1.2rem;
}
.detail-box h3{font-size:14px;font-weight:700;margin-bottom:8px}
.detail-box p{font-size:13px;color:var(--soft);line-height:1.9}

/* ── UPANISHAD SECTION ── */
.up-hero{
  background:linear-gradient(135deg,#1C0A02,#3D1A05);
  border-radius:var(--r);padding:1.6rem;margin-bottom:1.2rem;
  color:#fff;position:relative;overflow:hidden;
}
.up-hero::before{content:'🧘';position:absolute;right:20px;bottom:-10px;font-size:80px;opacity:.08}
.up-hero h2{font-size:20px;font-weight:700;color:#FFE8C0;margin-bottom:6px}
.up-hero p{font-size:13px;color:rgba(255,255,255,.7);line-height:1.75;max-width:600px}
.up-stats{display:flex;gap:20px;margin-top:14px;flex-wrap:wrap}
.up-stat{text-align:center}
.up-stat-num{font-size:22px;font-weight:700;color:#FFD700;font-family:'Inter',sans-serif}
.up-stat-label{font-size:10px;color:rgba(255,215,0,.6);margin-top:2px}

/* ── UPANISHAD FILTER TABS ── */
.up-filter{display:flex;gap:8px;margin-bottom:1.2rem;overflow-x:auto;padding-bottom:4px}
.up-filter::-webkit-scrollbar{height:0}
.up-filter-btn{
  padding:7px 16px;border-radius:20px;border:1.5px solid var(--bds);
  background:var(--w);cursor:pointer;font-size:12px;font-family:inherit;
  white-space:nowrap;transition:all .2s;font-weight:500;
}
.up-filter-btn:hover{background:var(--gl)}
.up-filter-btn.active{color:#fff;border-color:transparent;font-weight:600}

/* ── UPANISHAD CARDS ── */
.up-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:1.2rem}
.up-card{
  background:var(--w);border:1.5px solid var(--bd);border-radius:var(--r);
  padding:1.2rem;cursor:pointer;transition:all .22s;
  position:relative;overflow:hidden;box-shadow:var(--shadow);
}
.up-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  opacity:0;transition:opacity .2s;
}
.up-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg)}
.up-card:hover::before,.up-card.active::before{opacity:1}
.up-card.active{border-width:2px;transform:translateY(-1px)}
.up-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.up-card-name{font-size:14px;font-weight:700}
.up-card-veda{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600}
.up-card-sub{font-size:11px;color:var(--muted);margin-bottom:8px}
.up-card-teaser{font-size:12px;color:var(--soft);line-height:1.6}
.up-card-mv{
  margin-top:10px;padding:8px 10px;border-radius:var(--rs);
  font-family:'Tiro Devanagari Sanskrit',serif;font-size:13px;
}
.up-card-badges{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.up-mini-badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:500}

/* ── UPANISHAD DEEP DIVE ── */
.up-deep{
  background:var(--w);border:1px solid var(--bd);border-radius:var(--r);
  overflow:hidden;box-shadow:var(--shadow-lg);margin-bottom:1.2rem;
  animation:fadeUp .3s ease;
}
.up-deep-header{padding:1.4rem 1.4rem 1rem;border-bottom:1px solid var(--bd)}
.up-deep-title{font-size:18px;font-weight:700;margin-bottom:4px}
.up-deep-meta{font-size:12px;color:var(--muted);display:flex;gap:12px;flex-wrap:wrap}
.up-deep-meta span{display:flex;align-items:center;gap:4px}
.up-tabs{display:flex;border-bottom:1px solid var(--bd);overflow-x:auto}
.up-tab{
  padding:10px 16px;border:none;background:none;cursor:pointer;
  font-size:12px;font-family:inherit;color:var(--muted);
  border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s;
}
.up-tab.active{color:var(--s);border-bottom-color:var(--s);font-weight:600}
.up-tab:hover{color:var(--ink)}
.up-content{padding:1.4rem}
.up-story{font-size:13px;color:var(--soft);line-height:1.95;margin-bottom:1rem}
.up-story strong{color:var(--ink);font-weight:600}
.up-mv-box{
  background:linear-gradient(135deg,#1C0A02,#3D1A05);
  border-radius:var(--rs);padding:1.2rem 1.4rem;margin-bottom:1rem;
  position:relative;overflow:hidden;
}
.up-mv-box::before{content:'❝';position:absolute;top:8px;left:10px;font-size:30px;opacity:.08;color:#FFD700}
.up-mv-sanskrit{font-family:'Tiro Devanagari Sanskrit',serif;font-size:20px;color:#FFD700;margin-bottom:6px;line-height:1.6}
.up-mv-trans{font-size:13px;color:rgba(255,255,255,.75);margin-bottom:4px}
.up-mv-source{font-size:11px;color:rgba(255,215,0,.5);font-style:italic}
.up-lesson-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:1rem}
.up-lesson{background:var(--cream);border-radius:var(--rs);padding:12px 14px;border-left:3px solid}
.up-lesson-icon{font-size:18px;margin-bottom:5px}
.up-lesson-title{font-size:12px;font-weight:700;margin-bottom:4px}
.up-lesson-text{font-size:12px;color:var(--soft);line-height:1.65}
.up-story-box{
  background:var(--cream);border:1px solid var(--bd);border-radius:var(--rs);
  padding:1.2rem;margin-bottom:1rem;
}
.up-story-box h4{font-size:14px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.up-story-para{font-size:13px;color:var(--soft);line-height:1.9;margin-bottom:10px}
.up-story-para:last-child{margin-bottom:0}
.up-dialogue{
  background:var(--w);border-radius:var(--rs);padding:12px 14px;
  margin:10px 0;border-left:3px solid var(--bds);font-size:13px;color:var(--soft);line-height:1.8;
  font-style:italic;
}
.up-verse-box{
  background:var(--gl);border:1px solid var(--bds);border-radius:var(--rs);
  padding:1.2rem;margin-bottom:1rem;
}
.up-verse-sanskrit{font-family:'Tiro Devanagari Sanskrit',serif;font-size:15px;color:var(--ink);line-height:2;margin-bottom:8px}
.up-verse-divider{height:1px;background:var(--bds);margin-bottom:8px}
.up-verse-arth{font-size:13px;color:var(--soft);line-height:1.8}
.up-verse-src{font-size:11px;color:var(--muted);margin-top:6px;font-style:italic}
.concept-tag{display:inline-block;font-size:11px;padding:3px 10px;border-radius:12px;margin:3px;cursor:pointer;transition:all .15s;border:1px solid transparent}
.concept-tag:hover{transform:scale(1.05)}

/* ── NOTES ── */
.notes-wrap{margin-top:1rem}
.notes-textarea{
  width:100%;min-height:80px;padding:10px 12px;
  border:1.5px solid var(--bds);border-radius:var(--rs);
  font-size:13px;font-family:inherit;resize:vertical;outline:none;
  background:var(--cream);transition:border-color .2s;line-height:1.7;
}
.notes-textarea:focus{border-color:var(--g);background:var(--w)}
.notes-actions{display:flex;justify-content:space-between;align-items:center;margin-top:6px}
.notes-save{
  padding:6px 16px;background:var(--s);color:#fff;
  border:none;border-radius:20px;font-size:12px;cursor:pointer;font-family:inherit;
  transition:opacity .15s;font-weight:600;
}
.notes-save:hover{opacity:.88}
.notes-saved{font-size:11px;color:var(--g);opacity:0;transition:opacity .3s}
.notes-saved.show{opacity:1}

/* ── PROGRESS TRACKER ── */
.progress-tracker{
  background:var(--w);border:1px solid var(--bd);border-radius:var(--r);
  padding:1.2rem;margin-bottom:1rem;box-shadow:var(--shadow);
}
.pt-title{font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.pt-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.pt-item{text-align:center;padding:10px 6px;background:var(--cream);border-radius:var(--rs);border:1px solid var(--bd);cursor:pointer;transition:all .15s}
.pt-item:hover{background:var(--gl)}
.pt-item.done{background:var(--gl);border-color:var(--g)}
.pt-icon{font-size:20px;margin-bottom:4px}
.pt-name{font-size:10px;font-weight:600;color:var(--ink)}
.pt-status{font-size:9px;color:var(--muted);margin-top:2px}
.pt-bar-wrap{height:6px;background:var(--bd);border-radius:3px;overflow:hidden;margin-bottom:8px}
.pt-bar{height:100%;background:linear-gradient(90deg,var(--s),var(--g));border-radius:3px;transition:width .5s ease}
.pt-percent{font-size:11px;color:var(--muted);text-align:center}

/* ── HYMN ── */
.hymn-box{border:1.5px solid var(--bds);border-radius:var(--rs);padding:1.2rem;position:relative}
.hymn-sanskrit{font-family:'Tiro Devanagari Sanskrit',serif;font-size:16px;color:var(--ink);line-height:2.1;margin-bottom:10px}
.hymn-divider{height:1px;background:var(--bds);margin-bottom:10px}
.hymn-arth{font-size:13px;color:var(--soft);line-height:1.85}
.hymn-src{font-size:11px;color:var(--muted);margin-top:8px;font-style:italic}
.hymn-share{position:absolute;top:10px;right:10px;background:none;border:1px solid var(--bds);border-radius:8px;padding:4px 8px;cursor:pointer;font-size:12px;color:var(--muted);transition:all .15s}
.hymn-share:hover{background:var(--gl);color:var(--g)}

/* ── CONCEPTS ── */
.concept-chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:1rem}
.chip{
  font-size:12px;padding:6px 13px;border-radius:20px;
  background:var(--cream);border:1.5px solid var(--bds);
  color:var(--soft);cursor:pointer;transition:all .2s;font-family:inherit;
}
.chip:hover{transform:translateY(-1px);box-shadow:var(--shadow)}
.chip.active{font-weight:600;transform:translateY(-1px)}

/* ── QUIZ ── */
.quiz-wrap{max-width:640px;margin:0 auto}
.quiz-card{background:var(--w);border:1px solid var(--bd);border-radius:var(--r);padding:1.6rem;box-shadow:var(--shadow-lg);animation:fadeUp .3s ease}
.qz-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.qz-q-num{font-size:12px;color:var(--muted);font-weight:500}
.qz-score-badge{background:var(--sl);color:var(--s);border-radius:20px;padding:3px 12px;font-size:12px;font-weight:700}
.qz-bar{height:5px;background:var(--bd);border-radius:3px;margin-bottom:18px;overflow:hidden}
.qz-bar-fill{height:100%;background:linear-gradient(90deg,var(--s),var(--g));border-radius:3px;transition:width .4s ease}
.qz-shloka{font-family:'Tiro Devanagari Sanskrit',serif;font-size:14px;color:var(--soft);background:var(--cream);padding:10px 14px;border-radius:var(--rs);margin-bottom:14px;line-height:1.9;border-left:3px solid var(--bds)}
.qz-q{font-size:15px;font-weight:700;line-height:1.65;margin-bottom:16px;color:var(--ink)}
.qz-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.qz-opt{
  padding:12px 14px;border:1.5px solid var(--bds);border-radius:var(--rs);
  cursor:pointer;font-size:13px;font-family:inherit;background:var(--w);
  text-align:left;transition:all .2s;line-height:1.5;font-weight:500;
}
.qz-opt:hover:not(:disabled){background:var(--gl);border-color:var(--g);transform:translateY(-1px)}
.qz-opt.correct{background:#E8F5E9;border-color:#4CAF50;color:#1B5E20;animation:pop .25s ease}
.qz-opt.wrong{background:#FFEBEE;border-color:#EF5350;color:#B71C1C}
.qz-opt:disabled{cursor:default}
.qz-fb{font-size:13px;padding:12px 14px;border-radius:var(--rs);margin-bottom:14px;line-height:1.75;animation:fadeUp .2s ease}
.qz-fb.correct{background:#E8F5E9;color:#1B5E20;border:1px solid #4CAF50}
.qz-fb.wrong{background:#FFEBEE;color:#B71C1C;border:1px solid #EF5350}
.qz-next{width:100%;padding:12px;border:none;border-radius:var(--rs);background:linear-gradient(135deg,var(--s),#C8520A);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;box-shadow:0 4px 12px rgba(232,98,26,.3)}
.qz-next:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(232,98,26,.4)}
.qz-result{text-align:center;padding:24px 16px}
.qz-result-num{font-size:52px;font-weight:800;font-family:'Inter',sans-serif;background:linear-gradient(135deg,var(--s),var(--g));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.qz-result-msg{font-size:15px;color:var(--soft);margin:8px 0 20px;line-height:1.6}
.qz-restart{padding:12px 32px;border:2px solid var(--s);background:var(--sl);color:var(--s);border-radius:var(--rs);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s}
.qz-restart:hover{background:var(--s);color:#fff}

/* ── RISHIS ── */
.rishi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.rishi-card{background:var(--cream);border:1.5px solid var(--bd);border-radius:var(--r);padding:14px;text-align:center;cursor:pointer;transition:all .22s;box-shadow:var(--shadow)}
.rishi-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg)}
.rishi-card.active{border-width:2px;background:var(--gl)}
.rishi-icon{font-size:30px;margin-bottom:7px}
.rishi-name{font-size:13px;font-weight:700}
.rishi-veda{font-size:10px;color:var(--muted);margin-top:3px}
.rishi-detail{margin-top:14px;background:var(--cream);border-left:3px solid var(--s);border-radius:0 var(--rs) var(--rs) 0;padding:14px 16px;animation:fadeUp .25s ease}
.rishi-detail h4{font-size:14px;font-weight:700;margin-bottom:8px}
.rishi-detail p{font-size:13px;color:var(--soft);line-height:1.9}

/* ── DEITIES ── */
.deity-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.deity-card{background:var(--cream);border:1.5px solid var(--bd);border-radius:var(--r);padding:14px 10px;text-align:center;cursor:pointer;transition:all .22s;box-shadow:var(--shadow)}
.deity-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg)}
.deity-card.active{border-width:2px;background:var(--gl)}
.deity-svg{width:54px;height:54px;margin:0 auto 8px}
.deity-name{font-size:13px;font-weight:700}
.deity-role{font-size:10px;color:var(--muted);margin-top:2px}
.deity-detail{margin-top:14px;background:var(--cream);border-left:3px solid;border-radius:0 var(--rs) var(--rs) 0;padding:14px 16px;animation:fadeUp .25s ease}
.deity-detail h4{font-size:14px;font-weight:700;margin-bottom:8px}
.deity-detail p{font-size:13px;color:var(--soft);line-height:1.9}

/* ── TIMELINE ── */
.timeline{position:relative;padding-left:26px}
.timeline::before{content:'';position:absolute;left:9px;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,var(--s),var(--g))}
.tl-item{position:relative;margin-bottom:22px;animation:fadeUp .3s ease}
.tl-dot{position:absolute;left:-21px;top:4px;width:14px;height:14px;border-radius:50%;border:2.5px solid var(--w);box-shadow:var(--shadow)}
.tl-year{font-size:11px;font-weight:700;font-family:'Inter',sans-serif;margin-bottom:4px}
.tl-title{font-size:14px;font-weight:700;margin-bottom:4px}
.tl-desc{font-size:13px;color:var(--soft);line-height:1.75}

/* ── DOTS ── */
.nav-row2{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.dots{display:flex;gap:7px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--bds);cursor:pointer;transition:all .2s}
.dot.active{background:var(--s);transform:scale(1.3)}

/* ── ASK BTN ── */
.ask-btn{
  width:100%;padding:13px;border:1.5px solid;border-radius:var(--rs);
  font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;
  transition:all .2s;margin-top:4px;
}
.ask-btn:hover{transform:translateY(-1px);box-shadow:var(--shadow)}

/* ── MAHAVAKYA WALL ── */
.mv-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:1.2rem}
.mv-card{
  background:linear-gradient(135deg,#1C0A02,#3D1A05);
  border-radius:var(--r);padding:1.2rem;cursor:pointer;
  transition:all .22s;border:1px solid rgba(200,144,10,.3);
  box-shadow:var(--shadow);
}
.mv-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg)}
.mv-sanskrit{font-family:'Tiro Devanagari Sanskrit',serif;font-size:17px;color:#FFD700;margin-bottom:8px;line-height:1.6}
.mv-trans{font-size:12px;color:rgba(255,255,255,.75);margin-bottom:6px;line-height:1.6}
.mv-source{font-size:10px;color:rgba(255,215,0,.5);font-style:italic}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:#1C0A02;color:#FFD700;padding:10px 20px;border-radius:20px;
  font-size:13px;font-weight:600;z-index:999;transition:transform .3s ease;
  border:1px solid rgba(200,144,10,.4);box-shadow:var(--shadow-lg);
}
.toast.show{transform:translateX(-50%) translateY(0)}

/* ── FLOATING OM ── */
.float-om{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  font-family:'Tiro Devanagari Sanskrit',serif;font-size:300px;
  color:rgba(200,144,10,.025);pointer-events:none;z-index:0;user-select:none;
  animation:spin 120s linear infinite;
}

/* JARGON BUSTER */
.jargon{border-bottom:1.5px dashed var(--gold);cursor:pointer;color:inherit;position:relative}
.jargon-popup{display:none;position:absolute;bottom:125%;left:50%;transform:translateX(-50%);background:#1C0A02;color:#FFE8C0;font-size:11px;padding:8px 12px;border-radius:8px;width:200px;line-height:1.6;z-index:999;border:1px solid rgba(200,144,10,.4);box-shadow:0 4px 16px rgba(0,0,0,.3)}
.jargon-popup::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:#1C0A02}
.jargon:hover .jargon-popup,.jargon:focus .jargon-popup{display:block}
.jargon{outline:none}

/* BIG QUESTIONS */
.bq-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:1rem}
.bq-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:14px;cursor:pointer;transition:all .2s;text-align:center}
.bq-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);border-color:var(--border-strong)}
.bq-icon{font-size:28px;margin-bottom:8px}
.bq-q{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:4px;line-height:1.4}
.bq-vedic{font-size:10px;color:var(--muted);font-style:italic}
.bq-answer{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:1.4rem;margin-bottom:1rem;animation:fadeUp .3s ease}
.bq-answer-header{background:#1C0A02;border-radius:var(--rs) var(--rs) 0 0;padding:12px 16px;margin:-1.4rem -1.4rem 1rem}
.bq-answer-q{font-size:16px;font-weight:700;color:#FFE8C0;margin-bottom:3px}
.bq-answer-src{font-size:10px;color:rgba(255,215,0,.6)}
.bq-answer-text{font-size:13px;color:var(--soft);line-height:1.9;margin-bottom:12px}
.bq-answer-mv{font-family:'Tiro Devanagari Sanskrit',serif;font-size:16px;padding:10px 14px;background:var(--gold-light);border-radius:var(--rs);border:1px solid var(--bds);margin-bottom:8px;color:var(--ink)}
.bq-answer-link{font-size:12px;font-weight:600;color:var(--saffron);cursor:pointer;text-decoration:underline}
.bq-famous{display:flex;flex-direction:column;gap:8px}
.famous-card{background:var(--cream);border-radius:var(--rs);padding:11px 14px;border-left:3px solid var(--saffron)}
.famous-quote{font-size:12px;color:var(--soft);line-height:1.7;font-style:italic;margin-bottom:4px}
.famous-who{font-size:11px;color:var(--muted);font-weight:600}

/* 7-DAY CHALLENGE */
.challenge-hero{background:#1C0A02;border-radius:var(--radius);padding:1.4rem;margin-bottom:1rem;color:#fff;position:relative;overflow:hidden}
.challenge-hero::before{content:'🗓';position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:60px;opacity:.08}
.challenge-hero h2{font-size:19px;font-weight:700;color:#FFE8C0;margin-bottom:5px}
.challenge-hero p{font-size:13px;color:rgba(255,255,255,.7);line-height:1.7}
.challenge-stats{display:flex;gap:16px;margin-top:12px}
.cs-item{text-align:center}
.cs-num{font-size:20px;font-weight:700;color:#FFD700;font-family:'Inter',sans-serif}
.cs-label{font-size:9px;color:rgba(255,215,0,.6);margin-top:1px}
.day-list{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem}
.day-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:all .2s;cursor:pointer}
.day-card:hover{box-shadow:var(--shadow)}
.day-card.done{border-color:#4CAF50;background:#F1FAF2}
.day-card.active-day{border-color:var(--saffron);border-width:2px}
.day-card.locked{opacity:.55;cursor:default}
.day-header{display:flex;align-items:center;gap:12px;padding:12px 14px}
.day-num-badge{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;font-family:'Inter',sans-serif;flex-shrink:0}
.day-info{flex:1}
.day-title{font-size:13px;font-weight:700;margin-bottom:2px}
.day-subtitle{font-size:11px;color:var(--muted)}
.day-status{font-size:16px;flex-shrink:0}
.day-content{border-top:1px solid var(--border);padding:12px 14px;background:var(--cream);display:none}
.day-content.open{display:block}
.day-lesson{font-size:13px;color:var(--soft);line-height:1.85;margin-bottom:10px}
.day-mantra-box{background:var(--gold-light);border:1px solid var(--bds);border-radius:var(--rs);padding:10px 12px;margin-bottom:10px}
.day-mantra-sk{font-family:'Tiro Devanagari Sanskrit',serif;font-size:15px;color:var(--ink);margin-bottom:5px;line-height:1.8}
.day-mantra-arth{font-size:11px;color:var(--soft);line-height:1.6}
.day-reflect{background:var(--white);border-left:3px solid var(--saffron);border-radius:0 var(--rs) var(--rs) 0;padding:9px 12px;margin-bottom:10px;font-size:12px;color:var(--soft);font-style:italic;line-height:1.6}
.day-complete-btn{width:100%;padding:9px;background:var(--saffron);border:none;border-radius:var(--rs);color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .15s}
.day-complete-btn:hover{opacity:.88}
.day-already-done{font-size:12px;color:#2E7D32;font-weight:600;display:flex;align-items:center;gap:5px}
.challenge-complete-banner{background:linear-gradient(135deg,#1B5E20,#2E7D32);border-radius:var(--radius);padding:1.4rem;text-align:center;margin-bottom:1rem;color:#fff}
.ccb-icon{font-size:48px;margin-bottom:10px}
.ccb-title{font-size:20px;font-weight:700;margin-bottom:6px}
.ccb-text{font-size:13px;opacity:.85;line-height:1.7}

@media(max-width:600px){
  .veda-tabs{grid-template-columns:repeat(2,1fr)}
  .section-grid,.up-grid,.mv-grid{grid-template-columns:1fr}
  .deity-grid,.rishi-grid{grid-template-columns:repeat(2,1fr)}
  .qz-opts{grid-template-columns:1fr}
  .up-lesson-grid{grid-template-columns:1fr}
  .pt-grid,.facts-row{grid-template-columns:repeat(2,1fr)}
  .container{padding:1rem}
  .header{padding:.75rem 1rem}
  .header-tools{gap:4px}
  .tool-btn{padding:4px 9px;font-size:11px}
  .float-om{font-size:160px}
}
</style>
</head>
<body>

<div class="float-om">ॐ</div>

<header class="header">
  <div class="header-om">ॐ</div>
  <div class="header-text">
    <h1 id="hTitle">वेद ज्ञान</h1>
    <p id="hSub">चारों वेदों की आसान जानकारी</p>
  </div>
  <div class="header-tools">
    <button class="tool-btn" onclick="toggleLang()" id="langBtn">🌐 English</button>
    <button class="tool-btn" onclick="changeFontSize(-1)" style="font-size:13px">A−</button>
    <button class="tool-btn" onclick="changeFontSize(1)" style="font-size:14px">A+</button>
    <button class="tool-btn" onclick="showPage('bookmarks')" id="bmBtn">🔖 <span id="bmCount">0</span></button>
  </div>
</header>

<nav class="main-nav" id="mainNav">
  <button class="nav-tab" onclick="showPage('start')" id="n0">🌟 <span id="nl0">शुरू करें</span></button>
  <button class="nav-tab active" onclick="showPage('home')" id="n1">📚 <span id="nl1">वेद</span></button>
  <button class="nav-tab" onclick="showPage('upanishads')" id="n2">🧘 <span id="nl2">उपनिषद</span></button>
  <button class="nav-tab" onclick="showPage('mahavakya')" id="n3">✨ <span id="nl3">महावाक्य</span></button>
  <button class="nav-tab" onclick="showPage('rishis')" id="n4">🙏 <span id="nl4">ऋषि</span></button>
  <button class="nav-tab" onclick="showPage('deities')" id="n5">⚡ <span id="nl5">देवता</span></button>
  <button class="nav-tab" onclick="showPage('timeline')" id="n6">📅 <span id="nl6">काल</span></button>
  <button class="nav-tab" onclick="showPage('quiz')" id="n7">🎯 <span id="nl7">प्रश्नोत्तरी</span></button>
  <button class="nav-tab" onclick="showPage('challenge')" id="n8">🗓 <span id="nl8">7 दिन</span></button>
  <button class="nav-tab" onclick="showPage('progress')" id="n9">📈 <span id="nl9">प्रगति</span></button>
</nav>

<div id="toast" class="toast"></div>
<div class="container" id="app"></div>

<script>
/* ────────── STATE ────────── */
let lang='hi', fontSize=14, currentPage='home';
let activeVeda=0, activeSection=0, activeConcept=null, activeUpanishad=null;
let activeUpFilter='all', activeUpTab='story';
let activeDeity=null, activeRishi=null;
let quizState={idx:0,score:0,answered:false,sel:null,done:false};
let notes=JSON.parse(localStorage.getItem('vg_notes')||'{}');
let bookmarks=JSON.parse(localStorage.getItem('vg_bm')||'[]');
let readProgress=JSON.parse(localStorage.getItem('vg_prog')||'{}');

/* ────────── HELPERS ────────── */
const $=id=>document.getElementById(id);
const L=o=>typeof o==='object'?(o[lang]||o.hi):o;
function save(k,v){localStorage.setItem(k,JSON.stringify(v))}
function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}

function toggleLang(){
  lang=lang==='hi'?'en':'hi';
  $('langBtn').textContent=lang==='hi'?'🌐 English':'🌐 हिंदी';
  document.body.classList.toggle('en',lang==='en');
  $('hTitle').textContent=lang==='hi'?'वेद ज्ञान':'Veda Gyan';
  $('hSub').textContent=lang==='hi'?'चारों वेदों की आसान जानकारी':'Easy guide to the four Vedas';
  const nl=lang==='hi'?['वेद','उपनिषद','महावाक्य','ऋषि','देवता','काल','प्रश्नोत्तरी','प्रगति']:
                       ['Vedas','Upanishads','Mahavakyas','Rishis','Deities','Timeline','Quiz','Progress'];
  nl.forEach((l,i)=>{$('nl'+i).textContent=l});
  showPage(currentPage,true);
}
function changeFontSize(d){
  fontSize=Math.max(12,Math.min(19,fontSize+d));
  document.documentElement.style.setProperty('--fs',fontSize+'px');
}
function markRead(id){
  readProgress[id]=true; save('vg_prog',readProgress);
  $('bmCount').textContent=bookmarks.length;
  toast(lang==='hi'?'✅ पढ़ा हुआ माना गया!':'✅ Marked as read!');
  if($('app')) showPage(currentPage,true);
}
function toggleBM(id){
  const i=bookmarks.indexOf(id);
  if(i>-1)bookmarks.splice(i,1); else bookmarks.push(id);
  save('vg_bm',bookmarks);
  $('bmCount').textContent=bookmarks.length;
  toast(i>-1?(lang==='hi'?'🔖 बुकमार्क हटाया':'🔖 Bookmark removed'):(lang==='hi'?'🔖 बुकमार्क किया!':'🔖 Bookmarked!'));
  showPage(currentPage,true);
}
function saveNote(key){
  const v=$('note_'+key);if(!v)return;
  notes[key]=v.value; save('vg_notes',notes);
  const s=$('note_saved_'+key);if(s){s.classList.add('show');setTimeout(()=>s.classList.remove('show'),1500)}
  toast(lang==='hi'?'📝 नोट सेव हो गया!':'📝 Note saved!');
}
function shareText(txt){
  window.open('https://wa.me/?text='+encodeURIComponent(txt+'\n-- वेद ज्ञान App'),'_blank');
}

function showPage(p,noScroll){
  currentPage=p;
  for(let i=0;i<10;i++){const b=$('n'+i);if(b)b.classList.remove('active')}
  const map={start:0,home:1,upanishads:2,mahavakya:3,rishis:4,deities:5,timeline:6,quiz:7,challenge:8,progress:9,bookmarks:-1};
  if(map[p]>=0&&$('n'+map[p]))$('n'+map[p]).classList.add('active');
  const pages={start:renderStart,home:renderHome,upanishads:renderUpanishads,mahavakya:renderMahavakya,
               rishis:renderRishis,deities:renderDeities,timeline:renderTimeline,
               quiz:renderQuiz,challenge:renderChallenge,progress:renderProgress,bookmarks:renderBookmarks};
  if(pages[p])pages[p]();
  if(!noScroll)window.scrollTo(0,0);
}

/* ────────── DATA ────────── */
const DAILY=[
  {s:'तमसो मा ज्योतिर्गमय।\nमृत्योर्मा अमृतं गमय।',m:{hi:'अंधेरे से रोशनी की तरफ ले जाओ। मृत्यु से अमरता की तरफ।',en:'Lead me from darkness to light. From death to immortality.'},src:'बृहदारण्यक उपनिषद 1.3.28'},
  {s:'सर्वे भवन्तु सुखिनः।\nसर्वे सन्तु निरामयाः।',m:{hi:'सभी सुखी हों। सभी रोग-मुक्त हों।',en:'May all be happy. May all be free from illness.'},src:'बृहदारण्यक उपनिषद'},

       'ॐ / AUM':{hi:'सबसे पवित्र ध्वनि। अ = जागना, उ = सपना, म = गहरी नींद, मौन = तुरीय (परमात्मा)।',en:'The primordial sound. A = waking, U = dream, M = deep sleep, silence = Turiya (pure consciousness/Brahman).'},

  {id:'aitareya',name:{hi:'ऐतरेय उपनिषद',en:'Aitareya Upanishad'},

   teaser:{hi:'सृष्टि की उत्पत्ति -- शुरू में सिर्फ आत्मा थी।',en:'How creation happened -- in the beginning only the Self existed.'},
   mv:'प्रज्ञानम् ब्रह्म',
   mv_arth:{hi:'"ज्ञान (चेतना) ही ब्रह्म है"',en:'"Consciousness is Brahman"'},
   story:{hi:`<strong>मुख्य शिक्षा:</strong> यह बहुत छोटा और सरल उपनिषद है -- शुरुआत करने के लिए सबसे अच्छा।\n\nइसमें बताया गया है कि शुरू में सिर्फ आत्मा (Self) थी। उसने सोचा -- "मैं अकेला हूं, मुझे और बनाना चाहिए।" उसने पहले मन (mind) बनाया, फिर आकाश (space), फिर हवा (air), फिर पानी (water), फिर धरती (earth) बनाई।\n\nफिर उसने इंसान बनाया और उसके शरीर में प्रवेश किया। इसीलिए हर इंसान के अंदर परमात्मा है।\n\n<strong>सबसे बड़ी सीख:</strong> "प्रज्ञानम् ब्रह्म" -- यानी जो देखने की, सुनने की, सोचने की शक्ति है -- वही ब्रह्म है। वह शक्ति हमारे अंदर है।`,
           en:`<strong>Key Teaching:</strong> This is a short, accessible Upanishad -- the best one to start with.\n\nIt describes how creation happened: In the beginning only the Self existed. It thought, "I am alone, let me create more." It created mind, then space, then air, then water, then earth.\n\nThen it created humans and entered into them. This is why every human contains the divine within.\n\n<strong>Greatest Teaching:</strong> "Prajna brahma" -- the power of seeing, hearing, and thinking IS Brahman. That power is within us.`},
   lessons:[
     {icon:'🌱',t:{hi:'सृष्टि',en:'Creation'},d:{hi:'परमात्मा ने अपनी इच्छा से ब्रह्मांड बनाया -- एकाकीपन से बाहर।',en:'God created the universe from His own will -- out of solitude.'}},
     {icon:'👤',t:{hi:'मानव',en:'Human Being'},d:{hi:'हर इंसान के अंदर परमात्मा है -- हम उसकी सबसे बड़ी रचना हैं।',en:'Every human contains the divine within -- we are His greatest creation.'}},

  {id:'kaushitaki',name:{hi:'कौषीतकि उपनिषद',en:'Kaushitaki Upanishad'},
   veda:{hi:'ऋग्वेद',en:'Rigveda'},vedaId:'rig',vedaColor:'#BA7517',
   chapters:{hi:'4 अध्याय',en:'4 Chapters'},verses:{hi:'~60 श्लोक',en:'~60 Verses'},
   level:{hi:'मध्यम',en:'Intermediate'},
   teaser:{hi:'इंद्र की शिक्षा -- प्राण ही ब्रह्म है।',en:'Indra\'s teaching -- Prana is Brahman.'},
   mv:'प्राणो ब्रह्म',
   mv_arth:{hi:'"प्राण (जीवन शक्ति) ही ब्रह्म है"',en:'"Prana (life force) is Brahman"'},
   story:{hi:`इस उपनिषद में इंद्र (देवराज) और प्रतर्दन की मशहूर कहानी है।\n\nप्रतर्दन स्वर्ग पहुंचे। इंद्र ने कहा -- "मांगो, क्या चाहते हो?" प्रतर्दन ने कहा -- "तुम जो सबसे अच्छा समझो, वो दो।"\n\nइंद्र ने कहा -- <em>"मुझे जानो। यही सबसे बड़ा ज्ञान है। मैं ही प्राण हूं। मैं ही प्रज्ञा (चेतना) हूं। मुझे जानने वाला सब कुछ जान लेता है।"</em>\n\nइस उपनिषद की मुख्य सीख है -- <strong>प्राण (सांस/जीवन शक्ति) ही ब्रह्मन है।</strong> जब हम सांस लेते हैं, हम परमात्मा को महसूस कर रहे होते हैं।`,
           en:`This Upanishad contains the famous story of Indra and Pratardana.\n\nPratardana reached heaven. Indra said -- "Ask for anything you want." Pratardana said -- "Give me whatever you think is best for me."\n\nIndra replied -- <em>"Know me. That is the greatest knowledge. I am Prana. I am Prajna (consciousness). One who knows me knows everything."</em>\n\nThe key teaching: <strong>Prana (breath/life force) is Brahman.</strong> When we breathe, we are experiencing the divine.`},
   lessons:[
     {icon:'💨',t:{hi:'प्राण',en:'Prana'},d:{hi:'जीवन शक्ति (सांस) ही परमात्मा है -- यह हर पल हमारे साथ है।',en:'Life force (breath) is the divine -- it is with us every moment.'}},
     {icon:'👁️',t:{hi:'चेतना',en:'Consciousness'},d:{hi:'जागरूकता ही ब्रह्म है -- सोने में, जागने में, हर अवस्था में।',en:'Awareness is Brahman -- in sleep, in waking, in every state.'}},
     {icon:'❓',t:{hi:'सही सवाल',en:'Right Question'},d:{hi:'सबसे बड़ा ज्ञान मांगना -- यही असली ज्ञान की शुरुआत है।',en:'Asking for the highest wisdom -- this is the beginning of real knowledge.'}},

   verse:{s:'प्राणो ब्रह्म, प्रज्ञा आत्मा।',a:{hi:'"प्राण ही ब्रह्म है, चेतना ही आत्मा है।"',en:'"Prana is Brahman, consciousness is the Self."'},src:'कौषीतकि उपनिषद 3.2'},
   tags:{hi:['प्राण','चेतना','इंद्र'],en:['Prana','Consciousness','Indra']}},

  {id:'chandogya',name:{hi:'छांदोग्य उपनिषद',en:'Chandogya Upanishad'},
   veda:{hi:'सामवेद',en:'Samaveda'},vedaId:'sama',vedaColor:'#185FA5',
   chapters:{hi:'8 अध्याय',en:'8 Chapters'},verses:{hi:'~600 श्लोक',en:'~600 Verses'},
   level:{hi:'मध्यम',en:'Intermediate'},
   teaser:{hi:'"तत् त्वम् असि" -- नमक और पानी की कहानी।',en:'"Tat tvam asi" -- the story of salt and water.'},
   mv:'तत् त्वम् असि',
   mv_arth:{hi:'"वह तुम हो" -- परमात्मा और आत्मा एक हैं',en:'"That thou art" -- God and the soul are one'},
   story:{hi:`<strong>ॐ से शुरुआत:</strong> यह ॐ की महिमा से शुरू होता है -- "ॐ सबसे श्रेष्ठ है।"\n\n<strong>मशहूर कहानी -- नमक और पानी:</strong>\n\nएक बार श्वेतकेतु 12 साल गुरुकुल में पढ़कर घर आया। वह बहुत घमंडी था। उसके पिता उद्दालक आरुणि ने पूछा -- "क्या तुमने वो ज्ञान सीखा जिससे सब कुछ जाना जा सके?"\n\nश्वेतकेतु ने कहा -- "नहीं।"\n\nतब उद्दालक ने एक गिलास पानी में नमक डाला और कहा -- "कल सुबह आना।" सुबह उन्होंने कहा -- "नमक लाओ।" श्वेतकेतु ने देखा -- नमक दिख नहीं रहा। उद्दालक ने कहा -- "पानी पीओ -- नमकीन है ना? तो नमक है, लेकिन दिखता नहीं। वैसे ही परमात्मा हर चीज़ में है -- दिखता नहीं, लेकिन है।"\n\n<strong>तत् त्वम् असि -- "वह तुम हो"</strong> -- यही इस उपनिषद की सबसे बड़ी बात है।`,
           en:`<strong>Begins with Om:</strong> "Om is the most exalted of all."\n\n<strong>Famous Story -- Salt and Water:</strong>\n\nShvetaketu returned home after 12 years of study, very proud. His father Uddalaka asked -- "Did you learn that one thing by knowing which everything becomes known?"\n\nShvetaketu said -- "No."\n\nUddalaka dissolved salt in water and said -- "Come tomorrow." Next morning: "Bring me the salt." Shvetaketu looked -- no salt visible. Uddalaka said -- "Taste the water -- salty, isn\'t it? The salt is there but invisible. Just so, God is in everything -- invisible but present everywhere."\n\n<strong>Tat tvam asi -- "That thou art"</strong> -- the greatest teaching of this Upanishad.`},
   lessons:[
     {icon:'🧂',t:{hi:'नमक और पानी',en:'Salt & Water'},d:{hi:'जैसे नमक पानी में अदृश्य है लेकिन हर जगह -- वैसे ही परमात्मा।',en:'Like salt dissolved in water -- invisible yet everywhere. So is God.'}},
     {icon:'🎵',t:{hi:'ॐ',en:'Om'},d:{hi:'ॐ सबसे श्रेष्ठ ध्वनि है -- सारी सृष्टि इससे बनी है।',en:'Om is the most exalted sound -- all creation emerged from it.'}},
     {icon:'🤝',t:{hi:'एकता',en:'Unity'},d:{hi:'तुम और परमात्मा अलग नहीं -- "तत् त्वम् असि।"',en:'You and God are not separate -- "Tat tvam asi."'}},
     {icon:'📚',t:{hi:'ज्ञान',en:'True Knowledge'},d:{hi:'असली ज्ञान वो है जिससे हर चीज़ जानी जा सके -- वह है ब्रह्म-ज्ञान।',en:'True knowledge is that which makes everything known -- knowledge of Brahman.'}},
   ],
   verse:{s:'तत् त्वम् असि, श्वेतकेतो।',a:{hi:'"वह (परमात्मा) तुम हो, श्वेतकेतु।" -- उद्दालक आरुणि अपने बेटे को।',en:'"That thou art, Shvetaketu." -- Uddalaka Aruni to his son.'},src:'छांदोग्य उपनिषद 6.8.7'},
   tags:{hi:['एकता','ॐ','नमक-पानी'],en:['Unity','Om','Salt-Water']}},

   mv:'केनेषितं पतति प्रेषितं मनः',
   mv_arth:{hi:'"किसके आदेश से मन चलता है?"',en:'"By whose command does the mind move?"'},
   story:{hi:`<strong>शुरुआत एक सवाल से:</strong> "किसके कहने पर मन सोचता है? किसके कारण सांस चलती है? किसके आदेश से आंख देखती है? कौन कान को सुनाता है?"\n\nजवाब है -- <strong>वह परमात्मा जो आंख की आंख है, कान का कान है, मन का मन है।</strong> वह खुद आंख से नहीं देखा जा सकता -- लेकिन उसी के कारण आंख देखती है।\n\n<strong>इंद्र और उमा की कहानी:</strong> एक बार एक यक्ष (रहस्यमय शक्ति) प्रकट हुई। इंद्र, वायु, अग्नि -- किसी को समझ नहीं आया वह कौन है। अंत में देवी उमा (पार्वती) आईं और बताया -- "वह ब्रह्म था। उसी की शक्ति से तुम जीतते हो।"\n\n<strong>मुख्य सीख:</strong> परमात्मा सब के पीछे है -- लेकिन वह खुद किसी के द्वारा नहीं चलता।`,
           en:`<strong>Opens with a question:</strong> "By whose command does the mind think? By whose power does life move? By whose order does the eye see? Who makes the ear hear?"\n\nAnswer: <strong>That Brahman which is the eye of the eye, ear of the ear, mind of the mind.</strong> It cannot be seen by the eye -- yet the eye sees because of it.\n\n<strong>Story of Indra and Uma:</strong> A mysterious power (Yaksha) appeared. Indra, Vayu, Agni -- none could understand who it was. Finally Goddess Uma (Parvati) came and explained -- "That was Brahman. By Its power alone do you conquer."\n\n<strong>Key Teaching:</strong> God is behind everything -- yet God itself is caused by nothing.`},
   lessons:[
     {icon:'🎭',t:{hi:'पर्दे के पीछे',en:'Behind the Curtain'},d:{hi:'परमात्मा सब के पीछे है -- वही देखने वाला, सुनने वाला, सोचने वाला है।',en:'God is behind everything -- the real seer, hearer, thinker behind all experiences.'}},
     {icon:'❓',t:{hi:'असली सवाल',en:'Real Question'},d:{hi:'"मैं कौन हूं?" नहीं -- "कौन है जो मेरे अंदर देखता, सुनता, सोचता है?"',en:'Not "Who am I?" but "Who is it within me that sees, hears and thinks?"'}},
     {icon:'👁️',t:{hi:'परे और पास',en:'Beyond Yet Near'},d:{hi:'परमात्मा आंख से नहीं देखा जा सकता -- लेकिन वह सबसे करीब है।',en:'God cannot be seen by the eye -- yet is closer to us than anything.'}},
     {icon:'🏆',t:{hi:'विनम्रता',en:'Humility'},d:{hi:'इंद्र भी नहीं समझ सके -- इसलिए विनम्र रहना ज़रूरी है।',en:'Even Indra could not understand -- humility is essential on the path to wisdom.'}},
   ],
   verse:{s:'न तत्र चक्षुर्गच्छति न वाग्गच्छति नो मनः।',a:{hi:'"वहां आंख नहीं जाती, वाणी नहीं जाती, मन नहीं जाता।" -- परमात्मा इंद्रियों से परे है।',en:'"There the eye does not go, nor speech, nor the mind." -- God is beyond all the senses.'},src:'केन उपनिषद 1.3'},
   tags:{hi:['इंद्र','उमा','इंद्रियां'],en:['Indra','Uma','Senses']}},

  {id:'brihadaranyaka',name:{hi:'बृहदारण्यक उपनिषद',en:'Brihadaranyaka Upanishad'},
   veda:{hi:'यजुर्वेद',en:'Yajurveda'},vedaId:'yajur',vedaColor:'#3B6D11',
   chapters:{hi:'6 अध्याय',en:'6 Chapters'},verses:{hi:'~400 श्लोक',en:'~400+ Verses'},
   level:{hi:'उन्नत',en:'Advanced'},
   teaser:{hi:'सबसे बड़ा उपनिषद। याज्ञवल्क्य की शिक्षाएं। "अहम् ब्रह्मास्मि।"',en:'Largest Upanishad. Yajnavalkya\'s teachings. "I am Brahman."'},
   mv:'अहम् ब्रह्मास्मि',
   mv_arth:{hi:'"मैं ही ब्रह्म हूं" -- आत्मा = परमात्मा',en:'"I am Brahman" -- the Self = the Ultimate'},
   story:{hi:`<strong>सबसे बड़ा शास्त्रार्थ:</strong> राजा जनक ने एक बड़ी सभा बुलाई। घोषणा की -- "जो सबसे बड़ा विद्वान है, वो 1,000 गायें ले जाए।" ऋषि याज्ञवल्क्य ने अपने शिष्य को गायें हांकने को कहा। सब चकित। फिर शास्त्रार्थ हुआ।\n\n<strong>गार्गी का सवाल:</strong> गार्गी (महिला दार्शनिक) ने पूछा -- "यह धरती किस में बुनी है?" याज्ञवल्क्य ने जवाब दिया। उन्होंने पूछते-पूछते अंत में पूछा -- "ब्रह्म किस में बुना है?" याज्ञवल्क्य बोले -- "इससे ज़्यादा मत पूछो, वरना तुम्हारा सिर फट जाएगा।"\n\n<strong>मैत्रेयी की कहानी:</strong> याज्ञवल्क्य जंगल जाने लगे। पत्नी मैत्रेयी ने पूछा -- "अगर सारी धरती का सोना मिल जाए, तो क्या अमर हो सकते हैं?" जवाब -- "नहीं।" मैत्रेयी ने कहा -- "तो उसे मत दो। मुझे वो ज्ञान दो जिससे अमरता मिले।" फिर याज्ञवल्क्य ने "अहम् ब्रह्मास्मि" की शिक्षा दी।`,
           en:`<strong>The Great Debate:</strong> King Janaka called a grand assembly. He declared -- "Whoever is the greatest scholar, take these 1,000 cows." Sage Yajnavalkya told his student to drive the cows away. Everyone was stunned. Then the debate began.\n\n<strong>Gargi\'s Question:</strong> Gargi (the woman philosopher) asked -- "In what is the earth woven?" Yajnavalkya answered. She kept asking deeper and deeper, finally: "In what is Brahman woven?" Yajnavalkya said -- "Do not ask further, or your head will fall off."\n\n<strong>Maitreyi\'s Story:</strong> Yajnavalkya was about to leave for the forest. His wife Maitreyi asked -- "If I had all the wealth of the earth, would I become immortal?" Answer -- "No." Maitreyi: "Then don\'t give it to me. Give me the knowledge that brings immortality." Then Yajnavalkya taught "Aham Brahmasmi."`},
   lessons:[
     {icon:'🔥',t:{hi:'आत्म-ज्ञान',en:'Self-Knowledge'},d:{hi:'"अहम् ब्रह्मास्मि" -- मैं ही ब्रह्म हूं। यही सबसे बड़ा ज्ञान है।',en:'"Aham Brahmasmi" -- I am Brahman. This is the greatest knowledge.'}},
     {icon:'👩',t:{hi:'गार्गी',en:'Gargi'},d:{hi:'भारत की पहली महिला दार्शनिक ने याज्ञवल्क्य को चुनौती दी।',en:'India\'s first woman philosopher challenged even the great Yajnavalkya.'}},
     {icon:'💎',t:{hi:'असली संपत्ति',en:'Real Wealth'},d:{hi:'सोना-चांदी से अमरता नहीं मिलती -- ब्रह्म-ज्ञान से मिलती है।',en:'Gold and silver don\'t bring immortality -- Brahman-knowledge does.'}},
     {icon:'🌅',t:{hi:'नेति नेति',en:'Neti Neti'},d:{hi:'"न यह, न यह" -- परमात्मा को हटाते-हटाते जानो।',en:'"Not this, not this" -- know God by eliminating everything that is not God.'}},
   ],
   verse:{s:'अयम् आत्मा ब्रह्म।\nअहं ब्रह्मास्मि।',a:{hi:'"यह आत्मा ही ब्रह्म है। मैं ही ब्रह्म हूं।"',en:'"This Self is Brahman. I am Brahman."'},src:'बृहदारण्यक उपनिषद 4.4.5 / 1.4.10'},
   tags:{hi:['याज्ञवल्क्य','गार्गी','मैत्रेयी'],en:['Yajnavalkya','Gargi','Maitreyi']}},

  {id:'isha',name:{hi:'ईशावास्योपनिषद',en:'Isha Upanishad'},
   veda:{hi:'यजुर्वेद',en:'Yajurveda'},vedaId:'yajur',vedaColor:'#3B6D11',
   chapters:{hi:'1 अध्याय',en:'1 Chapter'},verses:{hi:'18 श्लोक',en:'18 Verses'},
   level:{hi:'शुरुआती',en:'Beginner'},
   teaser:{hi:'सबसे छोटा -- 18 श्लोक। गांधीजी का पसंदीदा।',en:'Shortest Upanishad -- 18 verses. Gandhi\'s favorite.'},
   mv:'ईशावास्यमिदम् सर्वम्',
   mv_arth:{hi:'"यह पूरा जगत परमात्मा में बसा है"',en:'"All this universe is pervaded by God"'},
   story:{hi:`<strong>शुरुआत:</strong> "ईशावास्यमिदम् सर्वम् यत्किञ्च जगत्यां जगत्" -- "यह पूरी दुनिया में जो कुछ भी है, वह सब परमात्मा में बसा है।"\n\n<strong>गांधीजी का प्यार:</strong> महात्मा गांधी ने कहा -- "अगर सारे धर्म-ग्रंथ नष्ट हो जाएं और सिर्फ ईशावास्योपनिषद का पहला श्लोक बचे, तो इंसान को ज़िंदगी जीने के लिए और कुछ नहीं चाहिए।"\n\n<strong>मुख्य शिक्षाएं:</strong>\n• <strong>त्याग:</strong> काम करो लेकिन फल की चाहत मत रखो\n• <strong>सर्वत्र ईश्वर:</strong> हर जगह परमात्मा है -- इसलिए किसी को नुकसान मत पहुंचाओ\n• <strong>भेद नहीं:</strong> जो सब में एक ही देखता है, उसे कोई दुख नहीं\n• <strong>ज्ञान और कर्म:</strong> दोनों ज़रूरी हैं -- अकेले से मुक्ति नहीं`,
           en:`<strong>Opening:</strong> "Isavasyam idam sarvam yat kincha jagatyam jagat" -- "Whatever exists in this ever-moving world is pervaded by God."\n\n<strong>Gandhi\'s Love:</strong> Mahatma Gandhi said -- "If all scriptures were destroyed and only the first verse of the Isha Upanishad remained, there would be enough wisdom to guide humanity."\n\n<strong>Key Teachings:</strong>\n• <strong>Renunciation:</strong> Act, but without clinging to results\n• <strong>God is Everywhere:</strong> God pervades everything -- so harm no one\n• <strong>No Division:</strong> One who sees the Self in all beings experiences no sorrow\n• <strong>Knowledge & Action:</strong> Both are necessary -- neither alone leads to liberation`},
   lessons:[
     {icon:'🌍',t:{hi:'सर्वत्र परमात्मा',en:'God Everywhere'},d:{hi:'हर चीज़ में, हर जगह, हर इंसान में -- परमात्मा है।',en:'In everything, everywhere, in every person -- God is present.'}},
     {icon:'🎯',t:{hi:'निष्काम कर्म',en:'Desireless Action'},d:{hi:'काम करो पूरी लगन से, लेकिन फल की चिंता मत करो।',en:'Work with full dedication, but do not be attached to the results.'}},
     {icon:'🕊️',t:{hi:'त्याग',en:'Renunciation'},d:{hi:'जो लालच से मुक्त है -- उसके लिए सब कुछ है।',en:'One who is free from greed -- for them everything is available.'}},
     {icon:'💝',t:{hi:'एकत्व',en:'Oneness'},d:{hi:'जो सब में एक ही आत्मा देखता है, उसे कोई दुख नहीं।',en:'One who sees the same Self in all beings experiences no sorrow or delusion.'}},
   ],
   verse:{s:'ईशावास्यमिदम् सर्वम्\nयत्किञ्च जगत्यां जगत्।\nतेन त्यक्तेन भुञ्जीथा\nमा गृधः कस्यस्विद्धनम्॥',a:{hi:'"इस पूरे जगत में जो कुछ भी है -- वह परमात्मा में बसा है। त्याग भाव से भोग करो -- किसी के धन की लालच मत करो।"',en:'"Whatever exists in this world is pervaded by God. Enjoy through renunciation -- do not covet anyone\'s wealth."'},src:'ईशावास्योपनिषद 1 -- पहला श्लोक'},
   tags:{hi:['गांधी','त्याग','एकत्व'],en:['Gandhi','Renunciation','Oneness']}},

  {id:'mundaka',name:{hi:'मुंडकोपनिषद',en:'Mundaka Upanishad'},
   veda:{hi:'अथर्ववेद',en:'Atharvaveda'},vedaId:'atharva',vedaColor:'#534AB7',
   chapters:{hi:'3 मुंडक',en:'3 Mundakas'},verses:{hi:'~64 श्लोक',en:'~64 Verses'},
   level:{hi:'मध्यम',en:'Intermediate'},
   teaser:{hi:'दो तरह का ज्ञान -- कौन सा असली?',en:'Two kinds of knowledge -- which is real?'},
   mv:'ब्रह्म वेद ब्रह्मैव भवति',
   mv_arth:{hi:'"जो ब्रह्म को जाने, वह ब्रह्म बन जाए"',en:'"He who knows Brahman becomes Brahman"'},
   story:{hi:`<strong>शुरुआत का सवाल:</strong> ऋषि शौनक ने आंगिरस के पास जाकर पूछा -- "हे भगवन, क्या एक ऐसी चीज़ है जिसे जानने से सब कुछ जाना जा सके?"\n\n<strong>दो तरह का ज्ञान:</strong>\n• <strong>अपरा विद्या</strong> (निम्न ज्ञान) -- वेद, व्याकरण, गणित, ज्योतिष, संगीत, भाषाशास्त्र\n• <strong>परा विद्या</strong> (उच्च ज्ञान) -- जिससे अविनाशी ब्रह्म जाना जाए\n\n<strong>आत्मा अमर है:</strong> "यह आत्मा किसी हथियार से नहीं कटती, आग से नहीं जलती, पानी से नहीं भीगती, हवा से नहीं सूखती।" -- यही शब्द बाद में भगवद्गीता में भी आए!\n\n<strong>शिकारी और दो पक्षी:</strong> एक पेड़ पर दो पक्षी बैठे हैं। एक फल खाता है, दूसरा सिर्फ देखता है। पहला पक्षी हमारी आत्मा (जीव) है जो संसार में लिप्त है। दूसरा परमात्मा (ब्रह्म) है -- निरपेक्ष, साक्षी।`,
           en:`<strong>Opening Question:</strong> Sage Shaunaka approached Angiras and asked -- "O Revered One, is there one thing by knowing which everything becomes known?"\n\n<strong>Two Kinds of Knowledge:</strong>\n• <strong>Apara Vidya</strong> (Lower Knowledge) -- Vedas, grammar, mathematics, astronomy, music, linguistics\n• <strong>Para Vidya</strong> (Higher Knowledge) -- by which the imperishable Brahman is known\n\n<strong>The Immortal Self:</strong> "The Self is not cut by weapons, not burned by fire, not wetted by water, not dried by wind." -- These same words appear later in the Bhagavad Gita!\n\n<strong>Two Birds on a Tree:</strong> Two birds sit on one tree. One eats the fruits; the other only watches. The first is the individual soul (Jiva) caught in the world. The second is Brahman -- detached, witness.`},
   lessons:[
     {icon:'🎓',t:{hi:'दो ज्ञान',en:'Two Knowledges'},d:{hi:'स्कूल की पढ़ाई और ब्रह्म-ज्ञान -- दोनों ज़रूरी, लेकिन दूसरा सबसे ऊपर।',en:'School learning and Brahman-knowledge -- both needed, but the latter is supreme.'}},
     {icon:'🐦',t:{hi:'दो पक्षी',en:'Two Birds'},d:{hi:'एक पक्षी (आत्मा) भोग करता है, दूसरा (परमात्मा) सिर्फ देखता है।',en:'One bird (soul) enjoys; the other (Brahman) only watches -- be the witness.'}},
     {icon:'⚡',t:{hi:'अमर आत्मा',en:'Immortal Self'},d:{hi:'आत्मा को न काटा जा सकता है, न जलाया जा सकता है। यह अमर है।',en:'The Self cannot be cut, burned, or destroyed. It is immortal.'}},
     {icon:'🙏',t:{hi:'विनम्रता',en:'Surrender'},d:{hi:'"ब्रह्म वेद ब्रह्मैव भवति" -- जो ब्रह्म को जाने, वह ब्रह्म बन जाए।',en:'"He who knows Brahman becomes Brahman" -- knowledge transforms the knower.'}}
   ],
   verse:{s:'ब्रह्म वेद ब्रह्मैव भवति।',a:{hi:'"जो ब्रह्म को जान लेता है, वह ब्रह्म ही बन जाता है।"',en:'"He who knows Brahman becomes Brahman itself."'},src:'मुंडकोपनिषद 3.2.9'},
   tags:{hi:['दो पक्षी','अमर आत्मा','ज्ञान'],en:['Two Birds','Immortal Self','Knowledge']}},

  {id:'mandukya',name:{hi:'माण्डूक्य उपनिषद',en:'Mandukya Upanishad'},
   veda:{hi:'अथर्ववेद',en:'Atharvaveda'},vedaId:'atharva',vedaColor:'#534AB7',
   chapters:{hi:'1 अध्याय',en:'1 Chapter'},verses:{hi:'12 श्लोक',en:'12 Verses'},
   level:{hi:'उन्नत',en:'Advanced'},
   teaser:{hi:'12 श्लोक -- ॐ की 4 अवस्थाएं। सबसे गहरा।',en:'12 verses -- 4 states of Om. The most profound.'},
   mv:'अयम् आत्मा ब्रह्म',
   mv_arth:{hi:'"यह आत्मा ही ब्रह्म है"',en:'"This Self is Brahman"'},
   story:{hi:`<strong>आदि शंकराचार्य ने कहा:</strong> "माण्डूक्य उपनिषद अकेला ही मोक्ष के लिए काफी है।"\n\nसिर्फ 12 श्लोक -- लेकिन वेदांत का पूरा दर्शन इसमें है।\n\n<strong>ॐ की व्याख्या:</strong>\n\n"ॐ" -- यह अक्षर ही सब कुछ है। जो भूत, वर्तमान, भविष्य है -- वह ॐ है।\n\n<strong>चेतना की 4 अवस्थाएं:</strong>\n\n• <strong>अ (जागृति):</strong> जागने की अवस्था -- हम दुनिया देखते हैं\n• <strong>उ (स्वप्न):</strong> सपने की अवस्था -- मन अपनी दुनिया बनाता है\n• <strong>म (सुषुप्ति):</strong> गहरी नींद -- कोई विचार नहीं, शांति\n• <strong>मौन -- तुरीय:</strong> "चौथी अवस्था" -- न जागना, न सपना, न नींद। यह शुद्ध चेतना है। यही परमात्मा है।\n\n<strong>तुरीय क्या है?</strong> यह वह अवस्था है जो तीनों को देखती है -- जैसे स्क्रीन जो सिनेमा देखने में खुद नहीं बदलती। तुरीय = साक्षी = शुद्ध आत्मा = ब्रह्म।`,
           en:`<strong>Adi Shankaracharya said:</strong> "The Mandukya Upanishad alone is sufficient for liberation."\n\nOnly 12 verses -- yet it contains the complete philosophy of Vedanta.\n\n<strong>Explanation of Om:</strong>\n\n"Om" -- this syllable is all this. Whatever exists -- past, present, future -- that is Om.\n\n<strong>4 States of Consciousness:</strong>\n\n• <strong>A (Waking):</strong> We experience the outer world\n• <strong>U (Dream):</strong> The mind creates its own world\n• <strong>M (Deep Sleep):</strong> No thoughts, only peace\n• <strong>Silence -- Turiya:</strong> "The Fourth State" -- not waking, not dreaming, not sleeping. This is pure consciousness. This is Brahman.\n\n<strong>What is Turiya?</strong> It is the state that witnesses all three -- like a cinema screen that doesn\'t change while films play on it. Turiya = Witness = Pure Self = Brahman.`},
   lessons:[
     {icon:'🔤',t:{hi:'ॐ का अर्थ',en:'Meaning of Om'},d:{hi:'अ+उ+म+मौन -- चार अवस्थाएं, एक ही परमात्मा।',en:'A+U+M+Silence -- four states, one Brahman.'}},
     {icon:'😴',t:{hi:'नींद में ब्रह्म',en:'God in Sleep'},d:{hi:'गहरी नींद में कोई दुख नहीं -- यह ब्रह्म की झलक है।',en:'In deep sleep there is no suffering -- this is a glimpse of Brahman.'}},
     {icon:'🎬',t:{hi:'साक्षी',en:'Witness'},d:{hi:'तुरीय वह स्क्रीन है जिस पर तीनों अवस्थाएं चलती हैं -- लेकिन वह खुद नहीं बदलती।',en:'Turiya is the screen on which all three states play -- but it itself never changes.'}},
     {icon:'🌟',t:{hi:'अयम् आत्मा ब्रह्म',en:'This Self is Brahman'},d:{hi:'तुम्हारे अंदर जो है और बाहर जो है -- वह एक ही है।',en:'What is within you and what is outside -- they are one and the same.'}},
   ],
   verse:{s:'ओमित्येतदक्षरमिदँ सर्वम्।\nतस्योपव्याख्यानम्।\nभूतं भवद् भविष्यदिति सर्वमोंकार एव।',a:{hi:'"ॐ -- यह अक्षर ही सब कुछ है। जो भूत था, जो वर्तमान है, जो भविष्य होगा -- वह सब ॐ ही है।"',en:'"Om -- this syllable is all this. Whatever exists -- past, present, future -- all that is just Om."'},src:'माण्डूक्य उपनिषद 1'},
   tags:{hi:['ॐ','तुरीय','4 अवस्थाएं'],en:['Om','Turiya','4 States']}},
];
